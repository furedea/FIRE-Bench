task_id: lets_verify_step_by_step_rq0
paper_type: llm_evaluation
research_question: "RQ1: Does process supervision, which involves guiding models through intermediate steps, outperform outcome supervision, which focuses on final results, in training reward models for large-scale language models solving problems from the MATH dataset, as measured by the percentage of problems solved?"
models:
  api:
    - gpt-4o
  huggingface: []
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "MATH"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("hendrycks/math")
    description: "A dataset for measuring mathematical problem-solving abilities, containing problems that require multi-step reasoning."
  - name: "PRM800K"
    source: synthetic
    loader: |
      # Synthetic generation of PRM800K dataset
      # This dataset consists of 800,000 step-level human feedback labels
      # used to train reward models for solving MATH problems.
      # The generation process involves human data-labelers providing
      # feedback on the correctness of each step in model-generated solutions.
      import random

      def generate_prm800k():
          steps = ["correct", "incorrect", "neutral"]
          return [{"step": random.choice(steps)} for _ in range(800000)]

      prm800k_dataset = generate_prm800k()
    description: "A dataset of 800,000 step-level human feedback labels used to train reward models for solving MATH problems."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"