task_id: longbench_bilingual_context_rq2
paper_type: llm_evaluation
research_question: "RQ3: How do large language models perform on few-shot learning tasks using LongBench, which includes datasets like TREC, TriviaQA, SAMSum, and LSHT?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "TREC"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("trec")
    description: "A question classification task involving 50 fine classes."
  - name: "TriviaQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("trivia_qa")
    description: "Contains question-answer pairs labeled with evidence passages."
  - name: "SAMSum"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("samsum")
    description: "Contains messenger-like conversations with human-annotated summaries."
  - name: "LSHT"
    source: unknown
    description: "A Chinese news classification task with 24 classes."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"