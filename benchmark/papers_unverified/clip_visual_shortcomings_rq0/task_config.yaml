task_id: clip_visual_shortcomings_rq0
paper_type: llm_evaluation
research_question: "RQ1: What are the systematic visual patterns that CLIP-based vision encoders struggle with, and how do these affect the performance of multimodal large language models (MLLMs) like GPT-4V?"
models:
  api:
    - gpt-4o
  huggingface:
    - openai/clip-vit-large-patch14
    - LLaVA-1.5
    - InstructBLIP
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "ImageNet-1K"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("imagenet-1k")
    description: "A large-scale dataset for image classification containing 1,000 classes."
  - name: "LAION-Aesthetic"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("laion-aesthetic")
    description: "A subset of the LAION dataset filtered for aesthetic quality."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"