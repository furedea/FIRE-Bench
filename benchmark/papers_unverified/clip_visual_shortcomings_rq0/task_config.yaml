task_id: clip_visual_shortcomings_rq0
paper_type: llm_evaluation
research_question: 'RQ1: What are the systematic visual shortcomings in current MLLMs?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: ImageNet-1K
  source: huggingface
  description: A large-scale dataset for image classification, used to evaluate visual
    models.
- name: LAION-Aesthetic
  source: external
  description: A dataset containing aesthetically pleasing images, used for evaluating
    visual models.
  url: https://github.com/LAION-AI/aesthetic-predictor
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/LAION-AI/aesthetic-predictor.git

    '
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
