task_id: longbench_bilingual_context_rq3
paper_type: llm_evaluation
research_question: "RQ4: How do large language models perform on synthetic tasks and code completion tasks using LongBench, which includes datasets like PassageCount, PassageRetrieval, LCC, and RepoBench-P?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "PassageCount"
    source: synthetic
    description: "A synthetic task designed to test the model's ability to count unique passages among duplicates."
  - name: "PassageRetrieval-en"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("openai/passage-retrieval-en")
    description: "A synthetic task where the model identifies the original paragraph corresponding to a given summary."
  - name: "PassageRetrieval-zh"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("openai/passage-retrieval-zh")
    description: "A synthetic task in Chinese where the model identifies the original paragraph corresponding to a given summary."
  - name: "LCC"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("openai/lcc")
    description: "A code completion dataset sampled from the Long Code Completion dataset, focusing on completing code based on preceding lines."
  - name: "RepoBench-P"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("openai/repo-bench-p")
    description: "A repository-level code completion dataset requiring aggregation of information from code across files."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"