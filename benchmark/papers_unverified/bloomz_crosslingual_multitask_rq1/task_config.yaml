task_id: bloomz_crosslingual_multitask_rq1
paper_type: novel_architecture
research_question: "Can models finetuned on multilingual datasets with English prompts generalize to tasks in languages not intentionally seen during pretraining or finetuning?"
proposed_method:
  name: "BLOOMZ and mT0"
  summary: "BLOOMZ and mT0 are finetuned variants of the BLOOM and mT5 model families, respectively. They are designed to enhance crosslingual generalization by finetuning on multilingual datasets with English prompts. This approach allows the models to generalize to tasks in languages that were not intentionally seen during pretraining or finetuning."
  key_components:
    - "Multitask finetuning on multilingual datasets with English prompts"
    - "Evaluation on tasks in languages not intentionally seen during pretraining or finetuning"
baselines:
  - "BLOOM"
  - "mT5"
reference_implementation:
  - "https://github.com/bigscience-workshop/xmtf"
datasets:
  - name: "xP3"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("bigscience/xP3")
    description: "A composite of supervised datasets in 46 languages with English and machine-translated prompts."
compute_hint: "Multiple GPUs, >24h"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"
  - "Implement the proposed method yourself -- do not import it from a library that bundles the paper's exact code."