task_id: faith_and_fate_compositionality_rq0
paper_type: llm_evaluation
research_question: "RQ1: How do transformer-based large language models (LLMs) perform on compositional tasks such as multi-digit multiplication, logic grid puzzles, and dynamic programming problems across zero-shot, few-shot, and fine-tuning settings? RQ2: What are the underlying mechanisms used by transformer-based large language models (LLMs) to solve compositional tasks like multi-digit multiplication, logic grid puzzles, and dynamic programming problems?"
models:
  api:
    - gpt-4
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "Generated multiplication problems"
    source: synthetic
    loader: |
      def generate_multiplication_problems(max_digits=5):
          import random
          problems = []
          for _ in range(1000):  # Generate 1000 problems
              x = random.randint(10**(max_digits-1), 10**max_digits - 1)
              y = random.randint(10**(max_digits-1), 10**max_digits - 1)
              problems.append((x, y, x * y))
          return problems
    description: "Synthetic dataset of multiplication problems with up to 5-digit numbers."
  - name: "Generated logic grid puzzles"
    source: synthetic
    loader: |
      def generate_logic_grid_puzzles(num_puzzles=1000, max_size=5):
          import random
          puzzles = []
          for _ in range(num_puzzles):
              size = random.randint(2, max_size)
              puzzle = {"houses": size, "attributes": ["color", "pet", "drink"], "clues": []}
              # Generate random clues
              for _ in range(size * 2):
                  clue_type = random.choice(["same_house", "direct_left", "besides"])
                  puzzle["clues"].append(clue_type)
              puzzles.append(puzzle)
          return puzzles
    description: "Synthetic dataset of logic grid puzzles with varying sizes and complexity."
  - name: "Generated dynamic programming sequences"
    source: synthetic
    loader: |
      def generate_dp_sequences(max_length=10, num_sequences=1000):
          import random
          sequences = []
          for _ in range(num_sequences):
              length = random.randint(2, max_length)
              sequence = [random.randint(-5, 5) for _ in range(length)]
              sequences.append(sequence)
          return sequences
    description: "Synthetic dataset of sequences with integers in the range [-5, 5] for dynamic programming tasks."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"