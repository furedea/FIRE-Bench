task_id: jailbroken_safety_failure_modes_rq0
paper_type: llm_evaluation
research_question: "RQ1: How do competing objectives in safety-trained large language models, such as GPT-4 and Claude v1.3, contribute to their vulnerability to jailbreak attacks (bypassing safety mechanisms), evaluated through prefix injection (adding harmless-looking prefixes) and refusal suppression (avoiding refusal phrases) techniques on a curated dataset of harmful prompts?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "Curated dataset of harmful prompts"
    source: synthetic
    description: "A collection of harmful prompts used to evaluate the vulnerability of safety-trained language models to jailbreak attacks."
references: []
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"