task_id: jailbroken_safety_failure_modes_rq0
paper_type: llm_evaluation
research_question: 'RQ1: What are the failure modes of safety training in LLMs that
  allow jailbreak attacks to succeed?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: Curated dataset of harmful prompts
  source: unknown
  description: A set of 32 harmful prompts used to evaluate GPT-4 and adapted from
    red-teaming datasets to cover various harmful prompt tags.
- name: Synthetic dataset of harmful prompts
  source: synthetic
  description: A set of 317 harmful prompts generated by GPT-4, filtered to consist
    only of prompts that neither GPT-4 nor Claude v1.3 would respond to.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
