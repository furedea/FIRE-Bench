task_id: react_reasoning_acting_rq2
paper_type: novel_architecture
research_question: 'RQ2: How does the ReAct approach perform on interactive decision-making
  tasks compared to existing methods?'
proposed_method:
  name: ReAct
  summary: ReAct is a novel approach that integrates reasoning and acting capabilities
    in large language models (LLMs) to improve performance on interactive decision-making
    tasks. It prompts LLMs to generate both reasoning traces and task-specific actions
    in an interleaved manner, allowing for dynamic reasoning and interaction with
    external environments to gather additional information.
  key_components:
  - Interleaved generation of reasoning traces and actions
  - Interaction with external environments for information gathering
  - Use of large language models like PaLM-540B for few-shot in-context learning
baselines:
- Act
- BUTLER
- IL
- IL+RL
reference_implementation: []
datasets:
- name: ALFWorld
  source: external
  description: A synthetic text-based game designed to align with the embodied ALFRED
    benchmark, requiring agents to achieve high-level goals by navigating and interacting
    with a simulated household.
  url: https://github.com/alfworld/alfworld
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/alfworld/alfworld.git

    '
- name: WebShop
  source: external
  description: An online shopping website environment with real-world products and
    human instructions, requiring agents to purchase products based on user instructions
    through web interactions.
  url: https://github.com/princeton-nlp/WebShop
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/princeton-nlp/WebShop.git

    '
compute_hint: single GPU, <24h
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
- Implement the proposed method yourself -- do not import it from a library that bundles
  the paper's exact code.
