task_id: rgb_rag_benchmark_rq0
paper_type: llm_evaluation
research_question: 'RQ1: How robust are LLMs to noise in retrieval-augmented generation?'
models:
  api:
  - gpt-3.5-turbo
  huggingface:
  - THUDM/ChatGLM-6B
  - THUDM/ChatGLM2-6B
  - lmsys/vicuna-7b-v1.3
  - Qwen/Qwen-7B-Chat
  - LianjiaTech/BELLE-7B-2M
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: Retrieval-Augmented Generation Benchmark (RGB)
  source: synthetic
  description: A benchmark designed to evaluate the noise robustness, negative rejection,
    information integration, and counterfactual robustness of LLMs in retrieval-augmented
    generation, using queries based on the latest news information.
references: []
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
