task_id: multilingual_cot_reasoning_rq3
paper_type: llm_evaluation
research_question: 'RQ4: Can multilingual chain-of-thought prompting improve performance
  on other multilingual reasoning benchmarks?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: MGSM
  source: external
  description: A multilingual benchmark for evaluating arithmetic reasoning abilities
    of language models, derived from GSM8K and translated into ten diverse languages.
  url: https://github.com/google-research/url-nlp/tree/main/mgsm
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/google-research/url-nlp/tree/main/mgsm.git

    '
- name: XCOPA
  source: huggingface
  description: A multilingual evaluation dataset designed to assess the causal commonsense
    reasoning capabilities of language models across multiple languages.
  loader: 'from datasets import load_dataset

    ds = load_dataset(''xcopa'')

    '
- name: XL-WiC
  source: unknown
  description: A multilingual word in-context semantic judgment benchmark covering
    thirteen languages.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
