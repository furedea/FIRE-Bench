task_id: pal_program_aided_reasoning_rq0
paper_type: novel_architecture
research_question: "RQ1: How does the use of programmatic reasoning steps with a Python interpreter impact the accuracy of large language models on mathematical reasoning tasks, as evaluated on datasets such as GSM8K, SVAMP, ASDIV, and MAWPS?"
proposed_method:
  name: "Program-Aided Language models (PAL)"
  summary: "PAL is a novel approach that uses large language models (LLMs) to read natural language problems and generate programs as intermediate reasoning steps, while offloading the solution step to a runtime such as a Python interpreter. This method allows the LLM to focus on decomposing the problem into runnable steps, leveraging the interpreter for accurate computation."
  key_components:
    - "LLM generates programmatic reasoning steps"
    - "Python interpreter executes the generated code"
    - "Integration of natural language and programming language reasoning"
baselines:
  - "Chain-of-Thought (COT) prompting"
  - "DIRECT prompting"
  - "PaLM-540B with chain-of-thought"
reference_implementation:
  - "http://reasonwithpal.com"
datasets:
  - name: "GSM8K"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("openai/gsm8k")
    description: "A benchmark dataset of grade-school math word problems."
  - name: "SVAMP"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("svamp")
    description: "A dataset for evaluating simple math word problem-solving abilities."
  - name: "ASDIV"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("asdiv")
    description: "A diverse corpus for evaluating and developing English math word problem solvers."
  - name: "MAWPS"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("mawps")
    description: "A repository of math word problems for evaluating problem-solving models."
compute_hint: "single GPU, <24h"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"
  - "Implement the proposed method yourself -- do not import it from a library that bundles the paper's exact code."