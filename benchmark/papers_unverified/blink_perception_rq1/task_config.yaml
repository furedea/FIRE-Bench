task_id: blink_perception_rq1
paper_type: llm_evaluation
research_question: "RQ2: What are the effects of varying visual prompt attributes, such as shape size and color, on the performance of multimodal LLMs in tasks like relative depth estimation, relative reflectance, and visual correspondence using datasets such as 'Depth in the Wild', 'Intrinsic Images in the Wild', and 'HPatches'?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "Depth in the Wild"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("depth-in-the-wild")
    description: "A dataset containing images with human annotations for relative depth estimation."
  - name: "Intrinsic Images in the Wild"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("intrinsic-images-in-the-wild")
    description: "A dataset with human annotations for comparing the reflectance (albedo) of two pixels."
  - name: "HPatches"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("hpatches")
    description: "A dataset containing image sequences taken under different illuminations and/or viewpoints for visual correspondence tasks."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"