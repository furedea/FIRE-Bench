task_id: v_star_visual_search_rq0
paper_type: novel_architecture
research_question: "RQ1: How does the integration of the V∗ visual search mechanism, which enhances focus on specific visual details in high-resolution images, affect the accuracy of multimodal large language models (MLLMs) on attribute recognition and spatial relationship reasoning tasks using the V∗Bench dataset, a benchmark for evaluating visual question answering?"
proposed_method:
  name: "SEAL (Show, sEArch, and TelL)"
  summary: "SEAL is a novel meta-architecture for multimodal large language models (MLLMs) that integrates a guided visual search mechanism, V∗, to enhance the model's ability to focus on specific visual details in high-resolution images. This mechanism uses the world knowledge in LLMs for efficient visual querying, building a visual working memory (VWM) that helps the model accurately answer visual questions by focusing on areas of interest."
  key_components:
    - "VQA LLM with Visual Working Memory (VWM)"
    - "V∗ visual search model"
    - "Integration with LLaVA as the base MLLM"
baselines:
  - "GPT-4V"
  - "LLaVA"
  - "MiniGPT-4"
  - "BLIP2"
  - "InstructBLIP"
  - "Otter"
  - "LLaVA-1.5"
  - "MM-React"
  - "VisualChatGPT"
  - "Visprog"
  - "Bard"
  - "Gemini Pro"
reference_implementation: []
datasets:
  - name: "V∗Bench"
    source: synthetic
    loader: |
      import random

      def generate_v_star_bench():
          # Synthetic generation of high-resolution images with specific attributes and spatial relationships
          images = []
          for _ in range(191):
              image = {
                  'resolution': (random.randint(2000, 2500), random.randint(1500, 2000)),
                  'attributes': random.choice(['color', 'material', 'pattern']),
                  'spatial_relationships': random.choice(['above', 'below', 'left', 'right'])
              }
              images.append(image)
          return images

      v_star_bench = generate_v_star_bench()
    description: "A benchmark dataset designed to evaluate MLLMs on their ability to process high-resolution images and focus on visual details, specifically for attribute recognition and spatial relationship reasoning tasks."
compute_hint: "single GPU, <24h"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"
  - "Implement the proposed method yourself -- do not import it from a library that bundles the paper's exact code."