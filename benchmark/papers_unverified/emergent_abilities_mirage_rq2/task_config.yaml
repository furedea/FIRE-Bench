task_id: emergent_abilities_mirage_rq2
paper_type: empirical_study
research_question: "RQ3: Can emergent abilities, defined as unexpected capabilities that arise in machine learning models, be induced in vision tasks using shallow nonlinear autoencoders on the CIFAR100 dataset and autoregressive Transformers (models predicting future data points based on past ones) on the Omniglot dataset by selecting specific evaluation metrics?"
study_type: dataset audit
data_sources:
  - name: "CIFAR100"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("cifar100")
    description: "A dataset of 100 classes of natural images used for training and evaluating image classification models."
  - name: "Omniglot"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("omniglot")
    description: "A dataset of handwritten characters from various alphabets used for training and evaluating image classification models."
analytical_tools:
  - "PyTorch"
  - "NumPy"
  - "Matplotlib"
references: []
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"