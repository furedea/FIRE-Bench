task_id: compositionality_gap_rq2
paper_type: llm_evaluation
research_question: 'RQ3: How can integrating a search engine with self-ask improve
  performance on compositional questions?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: Compositional Celebrities
  source: synthetic
  description: A dataset of 8.6k 2-hop questions combining frequently stated facts
    in improbable ways to test compositional reasoning.
- name: Bamboogle
  source: synthetic
  description: A dataset of 125 manually constructed 2-hop questions designed to be
    unanswerable by a popular internet search engine but answerable with evidence
    from Wikipedia.
- name: 2WikiMultiHopQA
  source: unknown
  description: An automatically generated dataset containing 2-hop compositional questions
    sourced from facts in Wikipedia articles.
- name: Musique
  source: external
  description: A dataset containing multi-hop questions via single-hop question composition.
  url: https://github.com/stonybrooknlp/musique
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/stonybrooknlp/musique.git

    '
references: []
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
