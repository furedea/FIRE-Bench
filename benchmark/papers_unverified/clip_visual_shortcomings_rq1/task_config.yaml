task_id: clip_visual_shortcomings_rq1
paper_type: llm_evaluation
research_question: 'RQ2: How do visual patterns in CLIP-blind pairs affect MLLM performance?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: ImageNet-1K
  source: huggingface
  description: A large-scale dataset for image classification, used to source images
    for evaluating visual question answering capabilities.
- name: LAION-Aesthetic
  source: huggingface
  description: A dataset containing aesthetic images, used to source images for evaluating
    visual question answering capabilities.
- name: Multimodal Visual Patterns (MMVP)
  source: synthetic
  description: A benchmark constructed using CLIP-blind pairs to evaluate visual abilities
    of state-of-the-art MLLMs with straightforward questions.
references: []
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
