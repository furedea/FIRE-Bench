task_id: clip_visual_shortcomings_rq1
paper_type: llm_evaluation
research_question: "RQ2: Can integrating vision-only self-supervised learning features with multimodal large language models improve their visual grounding capabilities?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "ImageNet-1K"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("imagenet-1k")
    description: "A large-scale dataset for image classification, containing 1,000 classes."
  - name: "LAION-Aesthetic"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("laion-aesthetic")
    description: "A dataset of aesthetic images used for training and evaluating visual models."
  - name: "Multimodal Visual Patterns (MMVP)"
    source: synthetic
    description: "A benchmark constructed using CLIP-blind pairs to evaluate visual grounding capabilities of multimodal models."
  - name: "LLaVA Benchmark"
    source: unknown
    description: "A benchmark for evaluating visual instruction tuning in multimodal models."
references: []
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"