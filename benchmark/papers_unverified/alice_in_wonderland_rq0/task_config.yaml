task_id: alice_in_wonderland_rq0
paper_type: llm_evaluation
research_question: 'RQ1: Do state-of-the-art LLMs exhibit reasoning breakdowns on
  simple common sense problems?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: AIW problem variations 1-4
  source: synthetic
  description: Simple common sense math problems with variations in the number of
    brothers and sisters to test model generalization and reasoning.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
