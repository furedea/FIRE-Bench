task_id: winoground_compositionality_rq2
paper_type: llm_evaluation
research_question: 'RQ3: What are the factors affecting model performance on the Winoground
  task?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: Winoground
  source: huggingface
  loader: 'from datasets import load_dataset

    dataset = load_dataset("facebook/winoground")

    '
  description: A dataset for evaluating visio-linguistic compositional reasoning,
    where models must match images and captions with identical words in different
    orders.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
