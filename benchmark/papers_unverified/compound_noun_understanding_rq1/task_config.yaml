task_id: compound_noun_understanding_rq1
paper_type: llm_evaluation
research_question: "RQ2: Can generating diverse captions using a large language model improve the understanding of compound nouns by vision-language models in text-to-image retrieval tasks?"
models:
  api:
    - gpt-4o
  huggingface:
    - openai/clip-vit-large-patch14
    - openai/clip-vit-base-patch32
    - openai/clip-vit-large-patch14-336
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "Compun"
    source: synthetic
    description: "A benchmark with 400 unique and commonly used compound nouns to evaluate the effectiveness of vision-language models in interpreting compound nouns."
references: []
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"