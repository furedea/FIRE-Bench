task_id: compositionality_gap_rq0
paper_type: llm_evaluation
research_question: "RQ1: How does the compositionality gap manifest in language models of varying sizes, specifically within the GPT-3 family, when evaluated on multi-hop question answering tasks?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "Compositional Celebrities"
    source: synthetic
    description: "A dataset of 8.6k 2-hop questions combining frequently stated facts in improbable ways to evaluate compositional reasoning."
  - name: "2WikiMultiHopQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("cais/2wikimultihopqa")
    description: "A dataset containing 2-hop compositional questions sourced from facts in Wikipedia articles."
  - name: "Musique"
    source: unknown
    description: "A dataset of multi-hop questions via single-hop question composition."
  - name: "Bamboogle"
    source: synthetic
    description: "A manually constructed dataset of 125 2-hop questions challenging a system's ability to decompose complex questions."
references: []
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"