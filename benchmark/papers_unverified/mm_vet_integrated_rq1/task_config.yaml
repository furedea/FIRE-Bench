task_id: mm_vet_integrated_rq1
paper_type: llm_evaluation
research_question: "RQ2: How does a large language model (LLM)-based evaluator perform in assessing open-ended outputs from large multimodal models (LMMs) using the MM-Vet dataset, which contains multimodal evaluation tasks, and averaged absolute differences (the mean of absolute score differences) as metrics?"
models:
  api:
    - gpt-4
  huggingface:
    - meta-llama/Llama-2-13b-chat
    - mistral/Mistral-7B-Instruct-v0.2
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "MM-Vet"
    source: local
    description: "A benchmark dataset designed to evaluate large multimodal models (LMMs) on complex multimodal tasks requiring the integration of multiple vision-language capabilities."
references: []
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"