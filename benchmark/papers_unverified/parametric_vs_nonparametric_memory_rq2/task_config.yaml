task_id: parametric_vs_nonparametric_memory_rq2
paper_type: llm_evaluation
research_question: "RQ3: How does adaptively combining non-parametric memories (external knowledge sources) and parametric memories (information stored within model parameters) based on entity popularity affect the efficiency and performance of language models?"
models:
  api:
    - gpt-4o
  huggingface:
    - EleutherAI/gpt-neo-2.7B
    - EleutherAI/gpt-j-6B
    - EleutherAI/gpt-neox-20B
    - facebook/opt-13b
    - openai/gpt-3.5-turbo
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "POPQA"
    source: synthetic
    loader: |
      from datasets import load_dataset

      def load_popqa():
          return load_dataset("path/to/popqa")
    description: "A synthetic dataset with 14k questions about long-tail entities, created by sampling knowledge triples from Wikidata and converting them into natural language questions."
  - name: "EntityQuestions"
    source: huggingface
    loader: |
      from datasets import load_dataset

      def load_entityquestions():
          return load_dataset("cais/entityquestions")
    description: "An open-domain QA dataset with a long-tail distribution, covering a wide range of entity popularities."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"