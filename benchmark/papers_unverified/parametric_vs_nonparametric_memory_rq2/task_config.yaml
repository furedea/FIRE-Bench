task_id: parametric_vs_nonparametric_memory_rq2
paper_type: llm_evaluation
research_question: 'RQ3: Can we build a system to adaptively combine non-parametric
  and parametric memories?'
models:
  api:
  - gpt-4o
  huggingface:
  - EleutherAI/gpt-neo-2.7B
  - EleutherAI/gpt-j-6B
  - EleutherAI/gpt-neox-20B
  - facebook/opt-13b
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: POPQA
  source: synthetic
  description: A dataset with 14k questions about long-tail entities, created by sampling
    knowledge triples from Wikidata and converting them into natural language questions.
- name: EntityQuestions
  source: unknown
  description: An open-domain QA dataset with a long-tail distribution, covering a
    wide range of entity popularity.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
