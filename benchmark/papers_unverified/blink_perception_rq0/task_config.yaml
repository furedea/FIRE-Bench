task_id: blink_perception_rq0
paper_type: llm_evaluation
research_question: "RQ1: How well do current multimodal large language models (GPT-4V, Gemini, LLaVA) perform on the Blink benchmark, which includes tasks like visual correspondence, relative depth, and forensic detection?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "HPatches"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("hpatches")
    description: "A benchmark and evaluation of handcrafted and learned local descriptors, used for visual correspondence tasks."
  - name: "Depth in the Wild"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("depth-in-the-wild")
    description: "Dataset for evaluating geometric understanding capabilities through relative depth estimation."
  - name: "COCO captions"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("coco", "captions")
    description: "Captions from the COCO dataset used as prompts for generating synthetic images."
  - name: "Stable Diffusion XL"
    source: synthetic
    loader: |
      from diffusers import StableDiffusionPipeline
      model_id = "stabilityai/stable-diffusion-xl"
      pipe = StableDiffusionPipeline.from_pretrained(model_id)
      prompt = "A scene description from COCO captions"
      image = pipe(prompt).images[0]
    description: "Synthetic images generated using Stable Diffusion XL for forensic detection tasks."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"