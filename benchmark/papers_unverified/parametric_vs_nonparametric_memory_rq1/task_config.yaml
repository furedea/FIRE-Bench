task_id: parametric_vs_nonparametric_memory_rq1
paper_type: llm_evaluation
research_question: "RQ2: To what extent can non-parametric memories (retrieval-augmented language models using external data sources like BM25 and Contriever) improve the performance of large language models with parametric memories (internal model weights) on long-tail factual knowledge (information about less popular entities) when evaluated on the POPQA and EntityQuestions datasets?"
models:
  api:
    - gpt-4o
  huggingface:
    - EleutherAI/gpt-neo-2.7B
    - facebook/opt-13b
    - EleutherAI/gpt-neox-20b
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "POPQA"
    source: synthetic
    description: "A dataset with 14k questions about long-tail entities, created by converting knowledge triples from Wikidata into natural language questions."
  - name: "EntityQuestions"
    source: unknown
    description: "An open-domain QA dataset with a long-tail distribution, covering less popular entities."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"