task_id: winoground_compositionality_rq0
paper_type: llm_evaluation
research_question: "RQ1: How well do state-of-the-art vision and language models (UNITER, ViLLA, VinVL, VisualBERT, ViLT, LXMERT, ViLBERT, UniT, FLAVA, CLIP, VSE++, VSRN) perform on the Winoground task, which requires matching images and captions with identical words in different orders?"
models:
  api: []
  huggingface:
    - facebook/uniter-large
    - facebook/uniter-base
    - facebook/villa-large
    - facebook/villa-base
    - microsoft/vinvl-base
    - uclanlp/visualbert-base
    - dandelin/vilt-b32
    - unc-nlp/lxmert
    - jiasenlu/vilbert-base
    - facebook/unit
    - openai/clip-vit-base-patch32
    - faghri/vsepp-resnet-coco
    - faghri/vsepp-vgg-coco
    - faghri/vsepp-resnet-flickr30k
    - faghri/vsepp-vgg-flickr30k
    - kuanghuei/vsrn-coco
    - kuanghuei/vsrn-flickr30k
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "Winoground"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("facebook/winoground")
    description: "A dataset for evaluating visio-linguistic compositional reasoning, where models must match images and captions with identical words in different orders."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"