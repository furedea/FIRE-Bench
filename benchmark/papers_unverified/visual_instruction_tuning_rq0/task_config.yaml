task_id: visual_instruction_tuning_rq0
paper_type: novel_architecture
research_question: 'RQ1: How can we generate multimodal instruction-following data
  using language-only models like GPT-4?'
proposed_method:
  name: 'LLaVA: Large Language and Vision Assistant'
  summary: LLaVA is a large multimodal model that connects a vision encoder with a
    language model to perform general-purpose visual and language understanding. It
    is trained using multimodal instruction-following data generated by language-only
    models like GPT-4. The model is designed to follow multimodal instructions by
    leveraging the capabilities of both pre-trained language and visual models.
  key_components:
  - Integration of CLIP visual encoder with Vicuna language model
  - Instruction tuning using GPT-4 generated multimodal data
  - End-to-end training on vision-language data
baselines:
- BLIP-2
- OpenFlamingo
reference_implementation:
- https://llava-vl.github.io
datasets:
- name: COCO
  source: external
  description: A dataset containing images and their corresponding captions, used
    for generating multimodal instruction-following data.
  url: https://github.com/cocodataset/cocoapi
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/cocodataset/cocoapi.git

    '
compute_hint: "8\xD7 A100 GPUs, pre-training within 4 hours, fine-tuning within 10\
  \ hours"
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
- Implement the proposed method yourself -- do not import it from a library that bundles
  the paper's exact code.
