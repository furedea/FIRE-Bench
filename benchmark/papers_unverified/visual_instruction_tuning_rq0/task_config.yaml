task_id: visual_instruction_tuning_rq0
paper_type: novel_architecture
research_question: "RQ1: How effective is the use of GPT-4 generated multimodal instruction-following data, which combines visual and textual instructions, in training large multimodal models like LLaVA (Large Language and Vision Assistant) for enhanced visual and language understanding, as evaluated on a synthetic dataset designed to test multimodal instruction-following capabilities?"
proposed_method:
  name: "LLaVA (Large Language and Vision Assistant)"
  summary: "LLaVA is a large multimodal model that integrates a vision encoder with a language model to perform general-purpose visual and language understanding. It is trained using GPT-4 generated multimodal instruction-following data, which combines visual and textual instructions. The model is designed to follow complex multimodal instructions and demonstrate enhanced capabilities in visual and language tasks."
  key_components:
    - "Integration of a vision encoder (CLIP) with a language model (Vicuna)"
    - "GPT-4 generated multimodal instruction-following data"
    - "End-to-end training on generated instructional vision-language data"
baselines:
  - "GPT-4"
  - "BLIP-2"
  - "OpenFlamingo"
reference_implementation:
  - "https://llava-vl.github.io"
datasets:
  - name: "Synthetic multimodal instruction-following dataset"
    source: synthetic
    loader: |
      import random

      def generate_synthetic_data(num_samples):
          data = []
          for _ in range(num_samples):
              image = f"image_{random.randint(1, 1000)}.jpg"
              instruction = f"Describe the contents of {image}."
              response = f"The image {image} contains a variety of objects."
              data.append((image, instruction, response))
          return data

      synthetic_data = generate_synthetic_data(1000)
    description: "A dataset designed to test multimodal instruction-following capabilities, combining visual and textual instructions."
compute_hint: "8× A100 GPUs, <24h for full training"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"
  - "Implement the proposed method yourself -- do not import it from a library that bundles the paper's exact code."