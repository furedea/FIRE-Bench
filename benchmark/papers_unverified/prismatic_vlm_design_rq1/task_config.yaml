task_id: prismatic_vlm_design_rq1
paper_type: novel_architecture
research_question: "RQ2: How do different image processing techniques and visual representations impact the performance of VLMs on visual question answering, object localization, and challenge tasks?"
proposed_method:
  name: "Prismatic VLMs"
  summary: "Prismatic VLMs explore the design space of visually-conditioned language models by investigating key design decisions such as image preprocessing, architecture, and optimization. The architecture uses a 'patch-as-token' approach, treating patch features from pretrained visual backbones as tokens that can be projected into the input space of a language model. This enables training with a simple objective and allows leveraging powerful language models."
  key_components:
    - "Pretrained visual backbones (e.g., CLIP, SigLIP, DINOv2)"
    - "Vision-language projector for mapping visual features to language model input"
    - "Language model for generating text from combined visual and text inputs"
baselines:
  - "LLaVa v1.5"
  - "InstructBLIP"
  - "PaLI-3"
reference_implementation:
  - "github.com/TRI-ML/prismatic-vlms"
  - "github.com/TRI-ML/vlm-evaluation"
datasets:
  - name: "VQAv2"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("visual_question_answering", "vqa_v2")
    description: "A dataset for visual question answering that assesses general visual reasoning."
  - name: "GQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("gqa")
    description: "A dataset for spatial and compositional reasoning in visual question answering."
  - name: "RefCOCO"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("refcoco")
    description: "A dataset for referring expression grounding and object localization."
  - name: "OCID-Ref"
    source: unknown
    loader: 
    description: "A 3D robotic dataset with embodied language for clutter scene grounding."
  - name: "VizWiz"
    source: unknown
    loader: 
    description: "A dataset for visual question answering with unanswerable questions."
  - name: "TextVQA"
    source: unknown
    loader: 
    description: "A dataset for reasoning around text present in images."
  - name: "TallyQA"
    source: unknown
    loader: 
    description: "A dataset for assessing a VLM's ability to count objects described in language."
  - name: "AI2D"
    source: unknown
    loader: 
    description: "A dataset consisting of multiple choice questions about scientific diagrams and charts."
compute_hint: "single GPU, <24h"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"
  - "Implement the proposed method yourself -- do not import it from a library that bundles the paper's exact code."