task_id: longbench_bilingual_context_rq1
paper_type: llm_evaluation
research_question: "RQ2: How do large language models perform on summarization tasks using LongBench, which includes datasets like GovReport, QMSum, MultiNews, and VCSUM?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "GovReport"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("HuggingFaceGovReport")
    description: "A large-scale collection of detailed reports from the U.S. Government Accountability Office and Congressional Research Service, each accompanied by a human-written summary."
  - name: "QMSum"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("HuggingFaceQMSum")
    description: "Query-summary pairs annotated over meetings across multiple domains, including product, academic, and committee meetings."
  - name: "MultiNews"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("HuggingFaceMultiNews")
    description: "Clusters of news articles discussing the same event or topic, each paired with a human-written summary."
  - name: "VCSUM"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("HuggingFaceVCSUM")
    description: "A large-scale Chinese meeting summarization dataset consisting of real-life meetings with versatile annotations to support multiple summarization tasks."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"