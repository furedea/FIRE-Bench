task_id: bags_of_words_vlm_rq1
paper_type: llm_evaluation
research_question: "RQ2: Why do Vision-Language Models (VLMs, which integrate visual and textual data) perform well on retrieval tasks (matching images with corresponding text) despite poor compositional understanding, as evaluated on perturbed datasets like COCO and Flickr30k using metrics such as Recall@1 and Recall@5?"
models:
  api: []
  huggingface:
    - openai/clip-vit-base-patch32
    - salesforce/blip
    - facebook/flava-full
    - zengyan-97/x-vlm
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "COCO"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("coco")
    description: "A large-scale object detection, segmentation, and captioning dataset."
  - name: "Flickr30k"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("flickr30k")
    description: "A dataset of images with corresponding captions, used for image-text retrieval tasks."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"