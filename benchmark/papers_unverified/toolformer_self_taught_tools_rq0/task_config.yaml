task_id: toolformer_self_taught_tools_rq0
paper_type: novel_architecture
research_question: "RQ1: Can a language model autonomously learn to use a variety of external tools, such as a calculator, a Q&A system, a search engine, a translation system, and a calendar, to improve zero-shot performance on downstream tasks?"
proposed_method:
  name: "Toolformer"
  summary: "Toolformer is a language model that autonomously learns to use external tools via simple APIs to enhance its performance on various tasks. It is trained to decide which APIs to call, when to call them, what arguments to pass, and how to incorporate the results into future token prediction. This is achieved in a self-supervised manner, requiring only a few demonstrations for each API. Toolformer integrates tools like a calculator, a Q&A system, a search engine, a translation system, and a calendar, significantly improving zero-shot performance on downstream tasks without sacrificing core language modeling abilities."
  key_components:
    - "API call decision-making mechanism"
    - "Self-supervised learning with minimal demonstrations"
    - "Integration of multiple external tools (calculator, Q&A system, search engine, translation system, calendar)"
baselines:
  - "GPT-J"
  - "OPT (66B)"
  - "GPT-3 (175B)"
reference_implementation: []
datasets:
  - name: "LAMA (SQuAD, Google-RE, T-REx)"
    source: unknown
    description: "A benchmark for evaluating language models on factual knowledge by completing short statements with missing facts."
  - name: "ASDiv"
    source: unknown
    description: "A dataset for evaluating mathematical reasoning abilities."
  - name: "SVAMP"
    source: unknown
    description: "A dataset for evaluating mathematical reasoning abilities."
  - name: "MAWPS"
    source: unknown
    description: "A dataset for evaluating mathematical reasoning abilities."
  - name: "Web Questions"
    source: unknown
    description: "A dataset for evaluating question answering abilities."
  - name: "Natural Questions"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("natural_questions")
    description: "A benchmark for evaluating question answering abilities with questions from real users."
  - name: "TriviaQA"
    source: unknown
    description: "A dataset for evaluating question answering abilities."
  - name: "MLQA"
    source: unknown
    description: "A multilingual question-answering benchmark with questions in multiple languages and context paragraphs in English."
  - name: "TEMPLAMA"
    source: unknown
    description: "A dataset containing cloze queries about facts that change with time."
  - name: "DATESET"
    source: synthetic
    loader: |
      import random
      from datetime import datetime, timedelta

      def generate_dateset():
          current_date = datetime.now()
          dateset = []
          for _ in range(1000):
              past_date = current_date - timedelta(days=random.randint(1, 365))
              future_date = current_date + timedelta(days=random.randint(1, 365))
              dateset.append({
                  "query": f"What day of the week was {past_date.strftime('%B %d, %Y')}?",
                  "answer": past_date.strftime('%A')
              })
          return dateset

      dataset = generate_dateset()
    description: "A synthetic dataset generated to evaluate temporal reasoning, requiring knowledge of the current date."
compute_hint: "single GPU, <24h"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"
  - "Implement the proposed method yourself -- do not import it from a library that bundles the paper's exact code."