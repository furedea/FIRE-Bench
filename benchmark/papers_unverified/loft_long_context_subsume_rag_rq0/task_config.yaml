task_id: loft_long_context_subsume_rag_rq0
paper_type: llm_evaluation
research_question: "RQ1: How well do Long-Context Language Models (LCLMs, which can process extended sequences of input data) perform in text, visual, and audio retrieval tasks compared to specialized models like CLIP for visual retrieval and PaLM 2 DE for audio retrieval, using datasets such as ArguAna, MS COCO, and FLEURS-en?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "ArguAna"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("beir", "arguana")
    description: "A dataset for argument retrieval tasks."
  - name: "MS COCO"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("coco", "2017")
    description: "A dataset for image retrieval tasks."
  - name: "FLEURS-en"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("google/fleurs", "en")
    description: "A dataset for audio retrieval tasks in English."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"