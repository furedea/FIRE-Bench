task_id: reversal_curse_rq2
paper_type: llm_evaluation
research_question: 'RQ3: Can different training setups alleviate the Reversal Curse?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: Synthetic dataset with paraphrases and both orders
  source: synthetic
  description: A dataset made up of documents of the form '<name> is <description>'
    and the reverse, where the names and descriptions are fictitious.
- name: Dataset of question-answer pairs
  source: synthetic
  description: A dataset of question-answer pairs presented either as instructions
    or as examples.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
