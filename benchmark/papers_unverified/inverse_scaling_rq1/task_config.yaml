task_id: inverse_scaling_rq1
paper_type: llm_evaluation
research_question: 'RQ2: How do scaling trends vary across different model series
  and tasks?'
models:
  api:
  - gpt-4
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: Inverse Scaling Prize Tasks
  source: external
  description: A collection of tasks designed to evaluate inverse scaling behavior
    in language models, including tasks like Resisting Correction, Memo Trap, and
    others.
  url: https://github.com/inverse-scaling/prize
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/inverse-scaling/prize.git

    '
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
