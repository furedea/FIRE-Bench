task_id: clip_visual_shortcomings_rq2
paper_type: llm_evaluation
research_question: 'RQ3: Can integrating vision self-supervised learning features
  improve MLLM visual grounding?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: ImageNet-1K
  source: huggingface
  description: A large-scale dataset for image classification, used to source images
    for evaluating visual grounding.
- name: LAION-Aesthetic
  source: huggingface
  description: A dataset containing aesthetic images, used to source images for evaluating
    visual grounding.
- name: Multimodal Visual Patterns (MMVP)
  source: synthetic
  description: A benchmark constructed using CLIP-blind pairs to evaluate visual grounding
    capabilities of MLLMs.
- name: LLaVA Benchmark
  source: external
  description: A benchmark for evaluating instruction-following and visual grounding
    capabilities of MLLMs.
  url: https://github.com/haotian-liu/LLaVA
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/haotian-liu/LLaVA.git

    '
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
