task_id: gsm_symbolic_rq0
paper_type: llm_evaluation
research_question: "RQ1: How reliable are the current evaluation metrics for mathematical reasoning in large language models when using the GSM8K benchmark compared to the GSM-Symbolic benchmark?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "GSM8K"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("openai/gsm8k")
    description: "A dataset of grade school math questions used to evaluate the mathematical reasoning capabilities of language models."
  - name: "GSM-Symbolic"
    source: synthetic
    loader: |
      import random

      def generate_gsm_symbolic():
          names = ["Alice", "Bob", "Charlie"]
          family = ["nephew", "cousin", "brother"]
          x = random.randint(5, 100)
          y = random.randint(5, 100)
          z = random.randint(5, 100)
          total = x + y + z + random.randint(85, 200)
          return {
              "name": random.choice(names),
              "family": random.choice(family),
              "x": x,
              "y": y,
              "z": z,
              "total": total
          }

      dataset = [generate_gsm_symbolic() for _ in range(5000)]
    description: "An enhanced benchmark that generates diverse variants of GSM8K questions using symbolic templates for more reliable evaluation of LLMs' mathematical reasoning."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"