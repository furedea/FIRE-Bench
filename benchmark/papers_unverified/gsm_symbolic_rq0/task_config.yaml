task_id: gsm_symbolic_rq0
paper_type: llm_evaluation
research_question: 'RQ1: How reliable are the current GSM8K results?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: GSM8K
  source: huggingface
  description: A benchmark dataset for evaluating the mathematical reasoning capabilities
    of LLMs, consisting of grade school math questions.
  loader: 'from datasets import load_dataset

    ds = load_dataset(''openai/gsm8k'')

    '
- name: GSM-Symbolic
  source: synthetic
  loader: "import random\n\ndef generate_gsm_symbolic():\n    names = [\"Sophie\"\
    , \"Emma\", \"Olivia\"]\n    family = [\"nephew\", \"cousin\", \"brother\"]\n\
    \    x = random.randint(5, 100)\n    y = random.randint(5, 100)\n    z = random.randint(5,\
    \ 100)\n    total = random.randint(100, 500)\n    ans = total - (x + y + z)\n\
    \    return {\n        \"name\": random.choice(names),\n        \"family\": random.choice(family),\n\
    \        \"x\": x,\n        \"y\": y,\n        \"z\": z,\n        \"total\": total,\n\
    \        \"ans\": ans\n    }\n"
  description: An enhanced benchmark that generates diverse variants of GSM8K questions
    using symbolic templates for more reliable evaluation of LLMs' performance.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
