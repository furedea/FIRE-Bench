task_id: nonverbal_abstract_reasoning_rq1
paper_type: llm_evaluation
research_question: 'RQ2: What are the root causes of the poor performance of MLLMs
  in nonverbal abstract reasoning tasks?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: IQ50
  source: unknown
  description: A nonverbal reasoning benchmark containing 50 visual puzzles crawled
    from the internet, used to assess nonverbal abstract reasoning abilities.
- name: RAVEN-S
  source: unknown
  description: A visual reasoning dataset containing 3,500 synthetic samples in seven
    categories, used to evaluate reasoning abilities in MLLMs.
- name: CCSE
  source: unknown
  description: A dataset containing 175 visual abstractions and reasoning problems
    from the China Civil Service Examination, used as a challenging benchmark for
    reasoning patterns.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
