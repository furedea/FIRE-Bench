task_id: nonverbal_abstract_reasoning_rq1
paper_type: llm_evaluation
research_question: "RQ2: What are the root causes of poor performance in nonverbal abstract reasoning tasks by Multimodal Large Language Models (MLLMs, which integrate text and visual data), specifically in terms of their textual reasoning and visual awareness capabilities as evaluated on the IQ50 dataset, a benchmark for assessing abstract reasoning through text-only and visual questions?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "IQ50"
    source: unknown
    description: "A nonverbal reasoning benchmark containing 50 visual puzzles for assessing abstract reasoning through text-only and visual questions."
  - name: "RAVEN"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("cais/raven")
    description: "A visual reasoning dataset containing synthetic samples in seven categories, each with a 3x3 matrix of images and eight options."
  - name: "CCSE"
    source: synthetic
    loader: |
      import random
      def generate_ccse_sample():
          patterns = ["location", "logic", "progression", "self-geometry", "relative-geometry"]
          configurations = ["one-row", "two-rows", "matrix"]
          return {
              "pattern": random.choice(patterns),
              "configuration": random.choice(configurations),
              "images": [random_image() for _ in range(4)],
              "options": [random_image() for _ in range(4)],
              "answer": random.choice(range(4))
          }
    description: "A dataset of visual abstractions and reasoning problems from the China Civil Service Examination, containing a matrix or sequence of images with four options."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"