task_id: visual_instruction_tuning_rq1
paper_type: novel_architecture
research_question: "RQ2a: What are the capabilities of a large language and vision assistant in multimodal reasoning when fine-tuned on a dataset of science questions requiring reasoning across text and images?"
proposed_method:
  name: "LLaVA: Large Language and Vision Assistant"
  summary: "LLaVA is an end-to-end trained large multimodal model that connects a vision encoder and a language model for general-purpose visual and language understanding. It is fine-tuned on machine-generated multimodal instruction-following data to improve its capabilities in following complex instructions involving both visual and textual information."
  key_components:
    - "Vision encoder based on CLIP"
    - "Language decoder using Vicuna"
    - "Multimodal instruction-following data generated by GPT-4"
baselines:
  - "GPT-4"
  - "BLIP-2"
  - "OpenFlamingo"
reference_implementation:
  - "https://llava-vl.github.io"
datasets:
  - name: "Science QA"
    source: unknown
    description: "A large-scale multimodal science question dataset that annotates the answers with detailed lectures and explanations, requiring reasoning across text and images."
compute_hint: "8× A100 GPUs, pre-training within 4 hours, fine-tuning within 10 hours"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"
  - "Implement the proposed method yourself -- do not import it from a library that bundles the paper's exact code."