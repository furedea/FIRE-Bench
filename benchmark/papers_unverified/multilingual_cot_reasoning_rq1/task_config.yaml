task_id: multilingual_cot_reasoning_rq1
paper_type: llm_evaluation
research_question: 'RQ2: Does the frequency of a language in the training data affect
  the reasoning performance of language models?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: MGSM
  source: external
  description: A multilingual benchmark created by translating 250 grade-school math
    problems from the GSM8K dataset into ten typologically diverse languages.
  url: https://github.com/google-research/url-nlp
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/google-research/url-nlp.git

    '
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
