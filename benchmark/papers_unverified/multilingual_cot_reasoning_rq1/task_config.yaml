task_id: multilingual_cot_reasoning_rq1
paper_type: llm_evaluation
research_question: "RQ2: How do large language models perform on multilingual reasoning benchmarks, such as XCOPA and XL-WiC, when evaluated using few-shot prompting with multilingual exemplars?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "XCOPA"
    source: unknown
    description: "A multilingual evaluation dataset designed to assess the causal commonsense reasoning capabilities of language models across multiple languages."
  - name: "XL-WiC"
    source: unknown
    description: "A multilingual word in-context semantic judgment benchmark covering thirteen languages."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"