task_id: jailbroken_safety_failure_modes_rq2
paper_type: llm_evaluation
research_question: 'RQ3: What are the implications of these findings for the defense
  against jailbreak attacks?'
models:
  api:
  - gpt-4
  huggingface:
  - anthropic/claude-v1.3
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: Curated Harmful Prompts Dataset
  source: synthetic
  description: A curated set of 32 harmful prompts adapted from red-teaming efforts
    of OpenAI and Anthropic.
- name: Synthetic Harmful Prompts Dataset
  source: synthetic
  description: A larger set of 317 harmful prompts generated by GPT-4, filtered to
    consist only of prompts that neither GPT-4 nor Claude v1.3 would respond to.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
