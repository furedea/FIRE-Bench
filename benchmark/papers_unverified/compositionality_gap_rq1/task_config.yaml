task_id: compositionality_gap_rq1
paper_type: llm_evaluation
research_question: "RQ2: Can elicitive prompting techniques, which involve guiding language models to generate intermediate reasoning steps, effectively narrow the compositionality gap (the difficulty language models face in combining known concepts to solve novel problems) across datasets such as Compositional Celebrities, Bamboogle, 2WikiMultiHopQA, and Musique, using metrics like Accuracy, F1, and Cover-EM?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "Compositional Celebrities"
    source: synthetic
    description: "A dataset of 8.6k 2-hop questions combining frequently stated facts in improbable ways to test compositional reasoning."
  - name: "Bamboogle"
    source: synthetic
    description: "A manually constructed dataset of 125 2-hop questions designed to be unanswerable by a popular internet search engine but answerable with facts from Wikipedia."
  - name: "2WikiMultiHopQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("cais/mmlu", "2wikimultihopqa")
    description: "A dataset containing 2-hop compositional questions sourced from facts in Wikipedia articles."
  - name: "Musique"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("Anthropic/hh-rlhf", "musique")
    description: "A dataset of multi-hop questions via single-hop question composition."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"