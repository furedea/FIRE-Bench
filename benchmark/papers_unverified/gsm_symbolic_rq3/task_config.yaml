task_id: gsm_symbolic_rq3
paper_type: llm_evaluation
research_question: "RQ4: Can large language models (LLMs, neural networks trained on vast text corpora) accurately solve mathematical problems by discerning relevant information, or do they rely on pattern matching when irrelevant information is added, as evaluated using 8-shot Chain-of-Thought prompting on the GSM-NoOp dataset?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "GSM-NoOp"
    source: synthetic
    description: "A dataset designed to challenge the reasoning capabilities of language models by adding seemingly relevant but ultimately inconsequential statements to mathematical problems."
references: []
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"