task_id: gsm_symbolic_rq3
paper_type: llm_evaluation
research_question: 'RQ4: Can LLMs really understand mathematical concepts?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: GSM8K
  source: huggingface
  loader: 'from datasets import load_dataset

    dataset = load_dataset("gsm8k")

    '
  description: A dataset of grade school math questions used to evaluate the mathematical
    reasoning capabilities of LLMs.
- name: GSM-Symbolic
  source: synthetic
  loader: "import random\n\ndef generate_gsm_symbolic():\n    names = [\"Alice\",\
    \ \"Bob\", \"Charlie\"]\n    family = random.choice([\"nephew\", \"cousin\", \"\
    brother\"])\n    x = random.randint(5, 100)\n    y = random.randint(5, 100)\n\
    \    z = random.randint(5, 100)\n    total = random.randint(100, 500)\n    ans\
    \ = total - (x + y + z)\n    return {\n        \"question\": f\"When {random.choice(names)}\
    \ watches her {family}, she gets out a variety of toys. The bag of building blocks\
    \ has {x} blocks, the bin of stuffed animals has {y} stuffed animals, and the\
    \ tower of stacking rings has {z} rings. She recently bought a tube of bouncy\
    \ balls, bringing the total number of toys to {total}. How many bouncy balls came\
    \ in the tube?\",\n        \"answer\": ans\n    }\n"
  description: An enhanced benchmark that generates diverse variants of GSM8K questions
    using symbolic templates.
- name: GSM-NoOp
  source: synthetic
  loader: "def generate_gsm_noop():\n    base_question = generate_gsm_symbolic()\n\
    \    noop_info = \"Additionally, she thought about buying a kite but decided against\
    \ it.\"\n    base_question[\"question\"] += \" \" + noop_info\n    return base_question\n"
  description: A dataset designed to challenge LLMs by adding irrelevant information
    to questions.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
