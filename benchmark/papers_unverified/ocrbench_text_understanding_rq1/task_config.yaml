task_id: ocrbench_text_understanding_rq1
paper_type: llm_evaluation
research_question: "RQ2: How do Large Multimodal Models perform in Scene Text-Centric Visual Question Answering (VQA) tasks using datasets like STVQA, TextVQA, OCRVQA, and ESTVQA?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "STVQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("cais/stvqa")
    description: "A dataset consisting of 31,000+ questions across 23,000+ images collected from various public datasets for Scene Text Visual Question Answering."
  - name: "TextVQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("openai/textvqa")
    description: "A dataset comprising 45,000+ questions on 28,000+ images sampled from specific OpenImages dataset categories expected to contain text."
  - name: "OCRVQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("openai/ocrvqa")
    description: "A dataset featuring over 1 million question-answer pairs spanning 207,000+ book cover images for Visual Question Answering by reading text in images."
  - name: "ESTVQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("openai/estvqa")
    description: "A dataset containing 20757 images along with 15056 English questions and 13006 Chinese questions for Scene Text Visual Question Answering."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"