task_id: ocrbench_text_understanding_rq1
paper_type: llm_evaluation
research_question: 'RQ2: How do LMMs perform on Scene Text-Centric VQA tasks?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: STVQA
  source: unknown
  description: A dataset consisting of questions related to scene text visual question
    answering.
- name: TextVQA
  source: huggingface
  description: A dataset comprising questions that require reading text in images
    to answer.
  loader: 'from datasets import load_dataset

    ds = load_dataset(''textvqa'')

    '
- name: OCRVQA
  source: unknown
  description: A dataset featuring questions and answers based on text found in images,
    particularly book covers.
- name: ESTVQA
  source: unknown
  description: A dataset divided into English and Chinese questions and answers for
    scene text visual question answering.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
