  - name: "NST"
    source: synthetic
    loader: |
      import random
      from PIL import Image, ImageDraw, ImageFont

      def generate_nst_image():
          img = Image.new('RGB', (100, 30), color = (255, 255, 255))
          d = ImageDraw.Draw(img)
          text = ''.join(random.choices('ABCDEFGHIJKLMNOPQRSTUVWXYZ', k=5))
          d.text((10,10), text, fill=(0,0,0))
          return img

      dataset = [generate_nst_image() for _ in range(3000)]
    description: "Non-Semantic Text dataset with shuffled characters."
  - name: "ST"
    source: synthetic
    loader: |
      import random
      from PIL import Image, ImageDraw, ImageFont

      def generate_st_image():
          img = Image.new('RGB', (100, 30), color = (255, 255, 255))
          d = ImageDraw.Draw(img)
          text = random.choice(['HELLO', 'WORLD', 'TEXT', 'IMAGE', 'DATA'])
          d.text((10,10), text, fill=(0,0,0))
          return img

      dataset = [generate_st_image() for _ in range(3000)]
    description: "Semantic Text dataset with meaningful words."
constraints:
