task_id: ocrbench_text_understanding_rq0
paper_type: llm_evaluation
research_question: "RQ1: How well do Large Multimodal Models (e.g., GPT4V, Gemini) perform in text recognition tasks across regular, irregular, occluded, artistic, handwritten, Chinese, and non-semantic text datasets?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
