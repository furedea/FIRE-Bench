task_id: jailbroken_safety_failure_modes_rq1
paper_type: llm_evaluation
research_question: "RQ2: How does mismatched generalization between pretraining and safety training in large language models (such as GPT-4 and Claude v1.3) lead to vulnerabilities against jailbreak attacks, evaluated through Base64 encoding and other obfuscation techniques?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "Curated dataset of harmful prompts"
    source: synthetic
    description: "A collection of harmful prompts used to evaluate the vulnerability of safety-trained language models to jailbreak attacks."
  - name: "Synthetic dataset of harmful prompts"
    source: synthetic
    description: "A larger set of harmful prompts generated to test the generalizability of jailbreak attacks on safety-trained language models."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"