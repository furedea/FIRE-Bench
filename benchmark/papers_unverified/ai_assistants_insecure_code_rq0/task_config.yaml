task_id: ai_assistants_insecure_code_rq0
paper_type: empirical_study
research_question: "RQ1: Do users write more insecure code, defined as code with vulnerabilities or security flaws, when given access to an AI programming assistant, a tool that provides code suggestions and completions, across tasks involving encryption, signing, file path handling, SQL operations, and C string manipulation?"
study_type: user study
data_sources:
  - name: "User study data"
    source: synthetic
    description: "Data collected from a user study where participants solved security-related programming tasks with and without AI assistance."
analytical_tools:
  - "Logistic Regression"
  - "Chi-squared Test"
  - "Cohen-Kappa Inter-rater Reliability"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"