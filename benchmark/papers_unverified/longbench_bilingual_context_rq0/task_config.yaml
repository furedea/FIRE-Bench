task_id: longbench_bilingual_context_rq0
paper_type: llm_evaluation
research_question: "RQ1: How do large language models perform on single-document and multi-document question answering tasks when evaluated with LongBench, which includes datasets like NarrativeQA, Qasper, MultiFieldQA, HotpotQA, and DuReader?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "NarrativeQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("narrativeqa")
    description: "A dataset consisting of long stories along with questions posed to test reading comprehension."
  - name: "Qasper"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("qasper")
    description: "A dataset featuring QA over NLP papers, annotated by NLP practitioners."
  - name: "MultiFieldQA"
    source: synthetic
    loader: |
      # Synthetic generation process for MultiFieldQA
      import random
      def generate_multifieldqa():
          fields = ["legal documents", "government reports", "encyclopedias", "academic papers"]
          documents = [f"Document from {field}" for field in fields]
          questions = [f"What is the main topic of the document from {field}?" for field in fields]
          answers = [f"The main topic of the document from {field} is XYZ." for field in fields]
          return [{"document": doc, "question": q, "answer": a} for doc, q, a in zip(documents, questions, answers)]
      dataset = generate_multifieldqa()
    description: "A manually curated dataset with documents and articles from multiple sources, including legal documents, government reports, encyclopedias, and academic papers."
  - name: "HotpotQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("hotpot_qa")
    description: "A dataset involving multi-hop questions directly written by native speakers given two related paragraphs."
  - name: "DuReader"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("dureader")
    description: "A Chinese dataset developed based on Baidu Search and Baidu Zhidao, comprising questions and related documents."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"