task_id: bags_of_words_vlm_rq2
paper_type: llm_evaluation
research_question: "RQ3: Can the selection of challenging negative examples based on compositional structures (the arrangement and combination of visual and textual elements) through composition-aware hard negative mining (a technique in contrastive learning that uses these challenging examples) enhance Vision-Language Models' ability to understand and process compositional relationships, as evaluated on COCO and Visual Genome datasets using Accuracy and Recall@1 metrics?"
models:
  api: []
  huggingface:
    - openai/clip-vit-base-patch32
    - salesforce/blip
    - zengyan-97/x-vlm
    - facebook/flava-full
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "COCO"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("coco")
    description: "A large-scale object detection, segmentation, and captioning dataset."
  - name: "Visual Genome"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("visual_genome")
    description: "A dataset with dense annotations of objects, attributes, and relationships in images."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"