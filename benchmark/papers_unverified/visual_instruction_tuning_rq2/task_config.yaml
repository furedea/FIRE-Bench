task_id: visual_instruction_tuning_rq2
paper_type: novel_architecture
research_question: 'RQ3: What are the architectural and training considerations for
  effectively instruction-tuning a multimodal model?'
proposed_method:
  name: LLaVA
  summary: LLaVA is a large multimodal model that connects a vision encoder and a
    language model to perform general-purpose visual and language understanding. It
    is trained using a two-stage instruction-tuning procedure on generated multimodal
    instruction-following data.
  key_components:
  - CLIP visual encoder
  - Vicuna language model
  - Two-stage instruction-tuning procedure
baselines:
- BLIP-2
- OpenFlamingo
reference_implementation:
- https://llava-vl.github.io
datasets:
- name: CC-595K
  source: unknown
  description: A filtered subset of the CC3M dataset used for pre-training the model.
- name: LLaVA-Instruct-158K
  source: external
  description: A dataset of 158K unique language-image instruction-following samples
    generated using GPT-4.
  url: https://github.com/haotian-liu/LLaVA
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/haotian-liu/LLaVA.git

    '
- name: ScienceQA
  source: external
  description: A large-scale multimodal science question dataset with annotated answers
    and explanations.
  url: https://github.com/lupantech/ScienceQA
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/lupantech/ScienceQA.git

    '
compute_hint: "8\xD7 A100 GPUs, pre-training completes within 4 hours, fine-tuning\
  \ within 10 hours"
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
- Implement the proposed method yourself -- do not import it from a library that bundles
  the paper's exact code.
