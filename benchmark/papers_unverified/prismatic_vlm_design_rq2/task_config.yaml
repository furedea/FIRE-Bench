task_id: prismatic_vlm_design_rq2
paper_type: novel_architecture
research_question: "RQ3: What is the impact of using base language models versus instruct-tuned language models (models fine-tuned with specific instructions) on the performance and safety of vision-language models (VLMs, which integrate visual and textual data) when evaluated on LLaVa v1.5 pretraining datasets for visual question answering, object localization, and challenge tasks?"
proposed_method:
  name: "Prismatic VLMs"
  summary: "Prismatic VLMs are a family of visually-conditioned language models designed to explore the impact of various design choices on model performance. These models integrate visual and textual data using a common architecture that includes a visual representation backbone, a vision-language projector, and a language model. The architecture allows for flexible experimentation with different pretrained components, optimization procedures, and data sources to identify key factors influencing VLM capabilities."
  key_components:
    - "Visual representation backbone (e.g., CLIP, DINOv2)"
    - "Vision-language projector"
    - "Language model (e.g., Llama-2, Vicuña v1.5)"
baselines:
  - "LLaVa v1.5"
  - "InstructBLIP"
reference_implementation:
  - "github.com/TRI-ML/prismatic-vlms"
  - "github.com/TRI-ML/vlm-evaluation"
datasets:
  - name: "LLaVa v1.5 pretraining datasets"
    source: unknown
    description: "A mixture of datasets used for pretraining vision-language models, including captioning datasets and multimodal instruct tuning examples."
compute_hint: "single GPU, <24h"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"
  - "Implement the proposed method yourself -- do not import it from a library that bundles the paper's exact code."