task_id: geval_llm_evaluator_rq1
paper_type: llm_evaluation
research_question: "RQ2: How does a novel evaluation metric for dialogue response generation quality perform compared to existing metrics in terms of correlation with human judgments on a benchmark dataset using Pearson and Spearman correlation?"
models:
  api:
    - gpt-4
    - text-davinci-003
  huggingface: []
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "Topical-Chat"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("topical_chat")
    description: "A testbed for meta-evaluating different evaluators on dialogue response generation systems that use knowledge."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"