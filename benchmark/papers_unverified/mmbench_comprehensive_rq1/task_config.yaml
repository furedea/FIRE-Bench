task_id: mmbench_comprehensive_rq1
paper_type: llm_evaluation
research_question: "RQ2: How effective is the strategy of using multiple evaluation passes with shuffled choices in providing robust evaluation results for vision-language models on the MMBench dataset, a benchmark for multimodal understanding, compared to traditional evaluation methods, as measured by Top-1 accuracy?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "MMBench"
    source: synthetic
    description: "A bilingual benchmark for assessing the multi-modal capabilities of vision-language models, containing over 3000 multiple-choice questions covering 20 different ability dimensions."
references: []
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"