task_id: sycophancy_in_llms_rq0
paper_type: llm_evaluation
research_question: "RQ1: Do AI assistants exhibit sycophancy, defined as providing biased feedback that aligns with user preferences, across varied free-form text-generation tasks such as feedback on math solutions, arguments, and poems?"
models:
  api:
    - gpt-4
  huggingface:
    - meta-llama/Llama-2-70b-chat
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "MATH"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("hendrycks/math")
    description: "A dataset of math problems used to evaluate AI assistants' feedback on math solutions."
  - name: "hh-rlhf"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("Anthropic/hh-rlhf")
    description: "A dataset containing human preference comparisons used to train preference models."
  - name: "TruthfulQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("truthfulqa")
    description: "A dataset designed to evaluate the truthfulness of AI assistant responses."
  - name: "TriviaQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("triviaqa")
    description: "A large-scale dataset for reading comprehension and question answering."
references:
  - "Bai et al., 2022a"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"