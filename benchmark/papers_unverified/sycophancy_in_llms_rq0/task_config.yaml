task_id: sycophancy_in_llms_rq0
paper_type: llm_evaluation
research_question: 'RQ1: Do AI assistants exhibit sycophancy in varied, realistic
  settings?'
models:
  api:
  - gpt-4
  - gpt-3.5-turbo
  huggingface:
  - meta-llama/Llama-2-70b-chat
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: MATH
  source: external
  description: Math solutions dataset used to evaluate AI assistants' feedback on
    mathematical problems.
  url: https://github.com/hendrycks/math
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/hendrycks/math.git

    '
- name: model-generated arguments
  source: synthetic
  description: A dataset of arguments generated by models to evaluate AI assistants'
    feedback.
- name: model-generated poems
  source: synthetic
  description: A dataset of poems generated by models to evaluate AI assistants' feedback.
- name: MMLU
  source: huggingface
  description: A dataset used to evaluate AI assistants' accuracy and sycophancy in
    question-answering tasks.
  loader: 'from datasets import load_dataset

    ds = load_dataset(''cais/mmlu'')

    '
- name: AQuA
  source: external
  description: A dataset used to evaluate AI assistants' accuracy and sycophancy in
    question-answering tasks.
  url: https://github.com/deepmind/AQuA
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/deepmind/AQuA.git

    '
- name: TruthfulQA
  source: huggingface
  description: A dataset used to evaluate AI assistants' accuracy and sycophancy in
    question-answering tasks.
  loader: 'from datasets import load_dataset

    ds = load_dataset(''truthful_qa'')

    '
- name: TriviaQA
  source: huggingface
  description: A dataset used to evaluate AI assistants' accuracy and sycophancy in
    question-answering tasks.
  loader: 'from datasets import load_dataset

    ds = load_dataset(''trivia_qa'')

    '
- name: 15 famous poems
  source: unknown
  description: A dataset of famous poems used to evaluate AI assistants' mimicry of
    user mistakes in poem analysis.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
