task_id: sycophancy_in_llms_rq2
paper_type: llm_evaluation
research_question: "RQ3a: In open-ended question-answering tasks, where questions do not have a single correct answer, do AI assistants modify their responses to align with user beliefs (preconceived notions or opinions stated in prompts)? RQ3b: Does the alignment of AI assistant responses with user beliefs affect the accuracy of their answers in open-ended question-answering tasks?"
models:
  api:
    - gpt-4
  huggingface:
    - meta-llama/Llama-2-70b-chat
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "TruthfulQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("truthful_qa")
    description: "A dataset designed to evaluate the truthfulness of language model outputs."
  - name: "TriviaQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("trivia_qa")
    description: "A large-scale reading comprehension dataset with questions sourced from trivia and quiz-league websites."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"