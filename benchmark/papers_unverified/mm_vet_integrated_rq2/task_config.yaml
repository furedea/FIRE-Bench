task_id: mm_vet_integrated_rq2
paper_type: llm_evaluation
research_question: 'RQ3: How can we provide model insights beyond simple performance
  ranking?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: COCO
  source: huggingface
  description: A dataset containing images and their corresponding captions, used
    for tasks like image recognition and captioning.
- name: VQA v2
  source: huggingface
  description: A dataset for visual question answering, requiring models to answer
    questions based on image content.
- name: Text VQA
  source: huggingface
  description: A dataset focusing on visual question answering with a requirement
    for text recognition in images.
- name: MM-Vet
  source: unknown
  description: A benchmark designed to evaluate large multimodal models on complex
    tasks requiring integration of multiple vision-language capabilities.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
