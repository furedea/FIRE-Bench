    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("vizwiz")
    description: "A dataset for visual question answering with general visual reasoning and unanswerable questions."
  - name: "VQAv2"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("vqa")
    description: "A dataset for visual question answering assessing general visual reasoning."
  - name: "GQA"
    source: huggingface
    loader: |
