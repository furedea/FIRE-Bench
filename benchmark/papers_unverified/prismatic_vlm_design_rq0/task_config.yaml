task_id: prismatic_vlm_design_rq0
paper_type: novel_architecture
research_question: "RQ1: What are the effects of different optimization procedures on the performance of visually-conditioned language models (VLMs) across visual question answering, object localization, and challenge tasks?"
proposed_method:
  name: "Prismatic VLMs"
  summary: "Prismatic VLMs explore the design space of visually-conditioned language models by investigating key design decisions such as image preprocessing, architecture, and optimization. The approach involves using a 'patch-as-token' method where patch features from pretrained visual backbones are treated as tokens projected into the input space of a language model. This enables training with a simple next-token prediction objective, leveraging powerful language models and efficient training tools."
  key_components:
    - "Pretrained visual backbones (e.g., CLIP, DINOv2)"
    - "Vision-language projector"
    - "Language model (e.g., Llama-2, Mistral)"
    - "Single-stage training procedure"
baselines:
  - "InstructBLIP"
  - "LLaVa v1.5"
reference_implementation:
  - "github.com/TRI-ML/prismatic-vlms"
  - "github.com/TRI-ML/vlm-evaluation"
datasets:
