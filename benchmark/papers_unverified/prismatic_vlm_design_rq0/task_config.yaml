  - name: "OCID-Ref"
    source: unknown
    description: "A robotics dataset probing out-of-distribution generalization, focusing on localizing objects in clutter."
  - name: "Visual Spatial Reasoning (VSR)"
    source: unknown
    description: "A dataset consisting of challenging True/False questions about individual spatial relationships in diverse scenes."
  - name: "TallyQA"
    source: unknown
    description: "A dataset consisting of questions that assess a VLM’s ability to count objects described in language."
  - name: "POPE"
    source: unknown
    description: "A dataset consisting of targeted Yes/No questions that assess a VLM’s propensity to hallucinate."
  - name: "AI2 Diagrams (AI2D)"
    source: unknown
    description: "A dataset consisting of multiple choice questions about scientific diagrams and charts."
compute_hint: "single GPU, <24h"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"
  - "Implement the proposed method yourself -- do not import it from a library that bundles the paper's exact code."