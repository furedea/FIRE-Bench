task_id: prismatic_vlm_design_rq0
paper_type: novel_architecture
research_question: 'RQ1: What are the key design decisions that influence VLM capabilities
  and downstream use?'
proposed_method:
  name: Prismatic VLMs
  summary: Prismatic VLMs are a family of visually-conditioned language models designed
    to explore and optimize the design space of VLMs. They focus on key design axes
    such as optimization procedures, image processing, pretrained visual representations,
    and language models. The architecture uses a 'patch-as-token' approach, treating
    patch features from pretrained visual backbones as tokens projected into the input
    space of a language model, enabling efficient training with a simple next-token
    prediction objective.
  key_components:
  - Pretrained visual representation backbones (e.g., CLIP, DINOv2)
  - Vision-language projector for mapping visual features to language model embeddings
  - Language models (e.g., Llama-2, Mistral) for generating text from combined visual
    and text inputs
  - Single-stage training pipeline to reduce compute costs
  - Fused visual backbones for enhanced performance
baselines:
- InstructBLIP
- LLaVa v1.5
reference_implementation:
- github.com/TRI-ML/prismatic-vlms
- github.com/TRI-ML/vlm-evaluation
datasets:
