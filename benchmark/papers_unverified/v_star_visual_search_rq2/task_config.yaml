task_id: v_star_visual_search_rq2
paper_type: novel_architecture
research_question: 'RQ3: What is the impact of the visual search mechanism on general
  multimodal capabilities?'
proposed_method:
  name: SEAL (Show, SEArch, and TelL)
  summary: "SEAL is a novel meta-architecture for multimodal large language models\
    \ (MLLMs) that integrates an LLM-guided visual search mechanism, V\u2217, to enhance\
    \ visual grounding capabilities. This architecture addresses the limitations of\
    \ current MLLMs in processing high-resolution images by employing a visual search\
    \ model that uses common sense and contextual cues to locate and focus on specific\
    \ visual elements. The visual search process builds a Visual Working Memory (VWM)\
    \ that is used to provide more accurate and informed responses to visual questions."
  key_components:
  - "LLM-guided visual search mechanism (V\u2217)"
  - Visual Working Memory (VWM)
  - Integration with MLLMs like LLaVA
baselines:
- GPT-4V
- Gemini Pro
- LLaVA
- BLIP2
- MiniGPT-4
- InstructBLIP
- Otter
- LLaVA-1.5
- MM-React
- VisualChatGPT
- Visprog
datasets:
- name: "V\u2217Bench"
  source: synthetic
  description: A benchmark specifically designed to evaluate MLLMs in their ability
    to process high-resolution images and focus on visual details, consisting of tasks
    like attribute recognition and spatial relationship reasoning.
reference_implementation: []
compute_hint: single GPU, <24h
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
- Implement the proposed method yourself -- do not import it from a library that bundles
  the paper's exact code.
