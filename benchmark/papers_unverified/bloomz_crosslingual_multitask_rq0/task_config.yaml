task_id: bloomz_crosslingual_multitask_rq0
paper_type: novel_architecture
research_question: "RQ1: Does finetuning multilingual language models on tasks in a single language enhance their performance on tasks in other languages, evaluated using the xP3 dataset (a multilingual benchmark for cross-lingual transfer) and various performance metrics?"
proposed_method:
  name: "BLOOMZ and mT0"
  summary: "BLOOMZ and mT0 are finetuned variants of the pretrained multilingual BLOOM and mT5 model families. These models are finetuned using multitask prompted finetuning (MTF) on English tasks with English prompts, allowing for task generalization to non-English languages that appear only in the pretraining corpus. Finetuning on multilingual tasks with English prompts further improves performance on English and non-English tasks, leading to various state-of-the-art zero-shot results."
  key_components:
    - "Multitask prompted finetuning (MTF) on English tasks"
    - "Use of xP3 dataset for multilingual task evaluation"
    - "BLOOM and mT5 model families as base architectures"
baselines:
  - "BLOOM"
  - "mT5"
  - "XGLM"
  - "mTk-Instruct"
reference_implementation:
  - "https://github.com/bigscience-workshop/xmtf"
datasets:
  - name: "xP3"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("bigscience/xP3")
    description: "A composite of supervised datasets in 46 languages with English and machine-translated prompts, used for evaluating cross-lingual transfer."
compute_hint: "single GPU, <24h"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"
  - "Implement the proposed method yourself -- do not import it from a library that bundles the paper's exact code."