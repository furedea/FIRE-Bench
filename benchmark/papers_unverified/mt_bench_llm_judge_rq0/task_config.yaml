task_id: mt_bench_llm_judge_rq0
paper_type: llm_evaluation
research_question: "RQ1: How well do large language models (GPT-4, GPT-3.5, Claude-V1) align with human preferences in evaluating chatbots on MT-Bench and Chatbot Arena datasets?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "MT-Bench"
    source: unknown
    description: "A series of open-ended questions that evaluate a chatbot’s multi-turn conversational and instruction-following ability."
  - name: "Chatbot Arena"
    source: unknown
    description: "A crowdsourced platform featuring anonymous battles between chatbots in real-world scenarios, collecting human preferences."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"