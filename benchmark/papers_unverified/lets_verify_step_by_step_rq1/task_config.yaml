task_id: lets_verify_step_by_step_rq1
paper_type: llm_evaluation
research_question: 'RQ2: How does active learning impact the data efficiency of process
  supervision?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: MATH
  source: external
  description: A dataset for measuring mathematical problem solving with automatically
    checkable answers.
  url: https://github.com/hendrycks/math
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/hendrycks/math.git

    '
- name: PRM800K
  source: unknown
  description: A dataset of 800,000 step-level human feedback labels used to train
    reward models.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
