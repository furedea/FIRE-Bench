task_id: lets_verify_step_by_step_rq1
paper_type: llm_evaluation
research_question: "RQ2: How does active learning impact the data efficiency of process supervision in training reward models for mathematical reasoning tasks?"
models:
  api:
    - gpt-4o
  huggingface: []
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "MATH"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("hendrycks/math")
    description: "A dataset for measuring mathematical problem-solving abilities, containing problems from various math subjects."
  - name: "PRM800K"
    source: local
    description: "A dataset of 800,000 step-level human feedback labels used to train reward models for mathematical reasoning tasks."
references: []
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"