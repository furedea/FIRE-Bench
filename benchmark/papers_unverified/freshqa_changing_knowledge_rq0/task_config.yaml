task_id: freshqa_changing_knowledge_rq0
paper_type: llm_evaluation
research_question: "RQ1: How well do current large language models (BARD, CHATGPT/GPT-4, T5, PALM, FLAN-T5) perform on the FRESHQA benchmark, which includes questions requiring fast-changing knowledge, slow-changing knowledge, never-changing knowledge, and false premises?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "FRESHQA"
    source: unknown
    description: "A dynamic QA benchmark with 600 questions divided into categories requiring fast-changing, slow-changing, never-changing knowledge, and false premises."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"