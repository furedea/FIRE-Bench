task_id: bbq_bias_benchmark_rq0
paper_type: llm_evaluation
research_question: "RQ1: How do current question-answering models (UnifiedQA, RoBERTa, DeBERTaV3) exhibit social biases across nine social dimensions (age, disability status, gender identity, nationality, physical appearance, race/ethnicity, religion, socio-economic status, sexual orientation) in ambiguous and disambiguated contexts?"
models:
  api:
    - gpt-4o
  huggingface:
    - allenai/unifiedqa-t5-11b
    - roberta-large
    - microsoft/deberta-v3-large
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "BBQ"
    source: local
    description: "A dataset of question sets constructed to highlight attested social biases against people belonging to protected classes along nine social dimensions relevant for U.S. English-speaking contexts."
references: []
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"