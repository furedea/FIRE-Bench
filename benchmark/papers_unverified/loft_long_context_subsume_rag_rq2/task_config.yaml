task_id: loft_long_context_subsume_rag_rq2
paper_type: llm_evaluation
research_question: "RQ3: How capable are Long-Context Language Models (LCLMs, which can process and generate text with extended context) in performing SQL-like compositional reasoning tasks (tasks that require combining multiple logical operations to query databases) compared to specialized SQL pipelines?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "Spider"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("yale-lily/spider")
    description: "A large-scale human-labeled dataset for complex and cross-domain semantic parsing and text-to-SQL task."
  - name: "SParC"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("yale-lily/sparc")
    description: "A cross-domain semantic parsing dataset in context, focusing on multi-turn text-to-SQL tasks."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"