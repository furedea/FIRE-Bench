task_id: faith_and_fate_compositionality_rq1
paper_type: llm_evaluation
research_question: "RQ2: What are the types of errors made by transformer LLMs at different reasoning depths in compositional tasks?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "Generated multiplication problems"
    source: synthetic
    description: "Synthetic dataset of multi-digit multiplication problems for evaluating reasoning errors in transformer LLMs."
  - name: "Generated puzzles"
    source: synthetic
    description: "Synthetic dataset of logic grid puzzles for evaluating reasoning errors in transformer LLMs."
  - name: "Generated sequences"
    source: synthetic
    description: "Synthetic dataset of sequences for dynamic programming problems to evaluate reasoning errors in transformer LLMs."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"