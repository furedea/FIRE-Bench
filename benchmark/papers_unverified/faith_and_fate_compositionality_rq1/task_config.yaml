task_id: faith_and_fate_compositionality_rq1
paper_type: llm_evaluation
research_question: 'RQ2: Can transformers generalize to out-of-domain (OOD) examples
  in compositional tasks?'
models:
  api:
  - gpt-4
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: Multi-digit multiplication
  source: synthetic
  description: A dataset consisting of multi-digit multiplication problems requiring
    step-by-step reasoning to solve.
- name: Logic grid puzzles
  source: synthetic
  description: A dataset of logic grid puzzles, such as Einstein's puzzle, requiring
    constraint satisfaction and reasoning.
- name: Dynamic programming problem
  source: synthetic
  description: A dataset involving a classic dynamic programming problem, such as
    finding a subsequence with the highest sum under certain constraints.
references: []
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
