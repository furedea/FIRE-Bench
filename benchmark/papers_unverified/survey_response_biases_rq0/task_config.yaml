task_id: survey_response_biases_rq0
paper_type: llm_evaluation
research_question: "RQ1: Do large language models (LLMs) exhibit human-like response biases, such as acquiescence, allow/forbid asymmetry, response order, opinion floating, and odd/even scale effects, when evaluated on survey questions derived from Pew Research's American Trends Panel?"
models:
  api:
    - gpt-3.5-turbo
    - gpt-3.5-turbo-instruct
  huggingface:
    - meta-llama/Llama-2-7b
    - meta-llama/Llama-2-13b
    - meta-llama/Llama-2-70b
    - upstage/SOLAR-0-70b-16bit
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "Pew Research's American Trends Panel"
    source: unknown
    description: "Survey questions curated and administered by experts, covering topics such as politics, technology, and family, used to evaluate response biases in LLMs."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"