task_id: ocrbench_text_understanding_rq3
paper_type: llm_evaluation
research_question: "RQ4: How do Large Multimodal Models perform in Key Information Extraction (KIE) tasks using datasets like SROIE, FUNSD, and POIE?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "SROIE"
    source: unknown
    description: "A dataset containing 1000 complete scanned receipt images for OCR and key information extraction competitions."
  - name: "FUNSD"
    source: unknown
    description: "A dataset consisting of 199 real, fully annotated, scanned forms that may contain noise."
  - name: "POIE"
    source: unknown
    description: "A dataset consisting of camera images from the Nutrition Facts label of products in English, with 3,000 images and 111,155 text instances."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"