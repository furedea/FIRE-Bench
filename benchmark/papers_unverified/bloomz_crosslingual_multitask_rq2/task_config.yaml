task_id: bloomz_crosslingual_multitask_rq2
paper_type: novel_architecture
research_question: "RQ3: How does finetuning on machine-translated prompts affect performance on human-written non-English prompts for BLOOMZ and mT0 models?"
proposed_method:
  name: "BLOOMZ-MT and mT0-MT"
  summary: "BLOOMZ-MT and mT0-MT are variants of the BLOOM and mT5 model families, finetuned on a dataset with machine-translated prompts (xP3mt) to improve crosslingual generalization. The models are designed to enhance performance on human-written non-English prompts by leveraging multilingual task data with machine-translated prompts."
  key_components:
    - "Multitask finetuning on xP3mt, a dataset with machine-translated prompts"
    - "Evaluation on human-written non-English prompts"
    - "Comparison with models finetuned on English-only prompts"
baselines:
  - "BLOOMZ"
  - "mT0"
reference_implementation:
  - "https://github.com/bigscience-workshop/xmtf"
datasets:
  - name: "xP3mt"
    source: unknown
    description: "A variant of the xP3 dataset with machine-translated prompts, covering multilingual tasks."
compute_hint: "single GPU, <24h"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"
  - "Implement the proposed method yourself -- do not import it from a library that bundles the paper's exact code."