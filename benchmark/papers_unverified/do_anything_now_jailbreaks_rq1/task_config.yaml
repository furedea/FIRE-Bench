task_id: do_anything_now_jailbreaks_rq1
paper_type: llm_evaluation
research_question: "RQ2: How effective are in-the-wild jailbreak prompts in bypassing the safeguards of popular LLMs like ChatGPT (GPT-3.5), GPT-4, and PaLM2 across various forbidden scenarios?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "Jailbreak Prompt Dataset"
    source: synthetic
    description: "A dataset comprising 107,250 samples across 13 forbidden scenarios to evaluate the effectiveness of jailbreak prompts on LLMs."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"