task_id: do_anything_now_jailbreaks_rq1
paper_type: llm_evaluation
research_question: 'RQ2: How effective are jailbreak prompts in bypassing LLM safeguards?'
models:
  api:
  - gpt-4
  huggingface:
  - databricks/dolly-v2-7b
  - lmsys/vicuna-7b-v1.1
  - THUDM/chatglm-6b
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: Jailbreak Prompt Dataset
  source: synthetic
  description: A dataset comprising 107,250 samples across 13 forbidden scenarios
    to evaluate the effectiveness of jailbreak prompts on LLMs.
- name: JAILBREAKHUB Dataset
  source: unknown
  description: A collection of 1,405 jailbreak prompts from various online platforms
    used to study their characteristics and effectiveness.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
