task_id: pal_program_aided_reasoning_rq2
paper_type: novel_architecture
research_question: "RQ2: Do language models that utilize external program execution, where models execute code to aid reasoning, achieve higher solve rates than those using step-by-step reasoning prompts in symbolic reasoning tasks such as COLORED OBJECTS (identifying attributes of colored items), PENGUINS (logical deduction about penguin characteristics), and DATE (calculating dates and times)?"
proposed_method:
  name: "Program-Aided Language models (PAL)"
  summary: "PAL is a novel approach that uses large language models (LLMs) to read natural language problems and generate programs as intermediate reasoning steps, while offloading the solution step to a runtime such as a Python interpreter. This method allows the LLM to focus on decomposing the problem into runnable steps, leveraging the interpreter for accurate computation, thus improving performance on arithmetic and symbolic reasoning tasks."
  key_components:
    - "LLM generates intermediate reasoning steps as code"
    - "Python interpreter executes the generated code"
    - "Synergy between neural LLM and symbolic interpreter"
baselines:
  - "Chain-of-Thought (COT) prompting"
reference_implementation: []
datasets:
  - name: "COLORED OBJECTS"
    source: synthetic
    loader: |
      objects = []
      objects += [('paperclip', 'purple')] * 1
      objects += [('stress ball', 'pink')] * 1
      objects += [('keychain', 'brown')] * 1
      objects += [('scrunchiephone charger', 'green')] * 1
      objects += [('fidget spinner', 'mauve')] * 1
      objects += [('pen', 'burgundy')] * 1
    description: "A task requiring answering questions about colored objects on a surface, involving tracking relative and absolute positions and colors."
  - name: "PENGUINS"
    source: synthetic
    loader: |
      penguins = []
      penguins.append(('Louis', 7, 50, 11))
      penguins.append(('Bernard', 5, 80, 13))
      penguins.append(('Vincent', 9, 60, 11))
      penguins.append(('Gwen', 8, 70, 15))
      penguins.append(('James', 12, 90, 12))
    description: "A task involving logical deduction about penguin characteristics, such as age, height, and weight."
  - name: "DATE"
    source: synthetic
    loader: |
      today = datetime(2015, 1, 1) - relativedelta(hours=36)
      one_week_from_today = today + relativedelta(weeks=1)
      one_week_from_today.strftime('%m/%d/%Y')
    description: "A date understanding task that involves inferring dates from natural language descriptions and performing date calculations."
compute_hint: "single GPU, <24h"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"
  - "Implement the proposed method yourself -- do not import it from a library that bundles the paper's exact code."