task_id: pal_program_aided_reasoning_rq1
paper_type: novel_architecture
research_question: 'RQ2: How does PAL perform on symbolic reasoning tasks compared
  to chain-of-thought prompting?'
proposed_method:
  name: Program-Aided Language Models (PAL)
  summary: PAL is a novel approach that uses large language models (LLMs) to read
    natural language problems and generate programs as intermediate reasoning steps,
    while offloading the solution step to a runtime such as a Python interpreter.
    This method allows the LLM to focus on decomposing the problem into runnable steps,
    leveraging the interpreter for accurate computation.
  key_components:
  - LLM for problem decomposition
  - Python interpreter for executing generated code
  - Integration of natural language and programming language reasoning
baselines:
- Chain-of-Thought (COT) prompting
reference_implementation: []
datasets:
- name: GSM8K
  source: huggingface
  loader: 'from datasets import load_dataset

    dataset = load_dataset("gsm8k")

    '
  description: A dataset of grade-school level math word problems.
- name: SVAMP
  source: external
  description: A dataset for evaluating simple math word problems.
  url: https://github.com/arkilpatel/SVAMP
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/arkilpatel/SVAMP.git

    '
- name: ASDIV
  source: external
  description: A diverse corpus for evaluating and developing English math word problem
    solvers.
  url: https://github.com/chaochun/nlu-asdiv-dataset
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/chaochun/nlu-asdiv-dataset.git

    '
- name: MAWPS
  source: unknown
  description: A repository of math word problems.
- name: BIG-Bench Hard
  source: external
  description: A collection of challenging tasks for evaluating the reasoning capabilities
