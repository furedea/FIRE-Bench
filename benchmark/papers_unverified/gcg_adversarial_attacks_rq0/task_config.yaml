task_id: gcg_adversarial_attacks_rq0
paper_type: novel_architecture
research_question: 'RQ1: Can a universal adversarial suffix be generated to induce
  objectionable content in aligned language models?'
proposed_method:
  name: Greedy Coordinate Gradient (GCG)
  summary: The Greedy Coordinate Gradient (GCG) method is a novel approach for generating
    universal adversarial suffixes that induce objectionable content in aligned language
    models. It combines greedy and gradient-based search techniques to optimize adversarial
    suffixes across multiple prompts and models, demonstrating high transferability
    and effectiveness in circumventing model alignment.
  key_components:
  - Initial affirmative responses to harmful queries
  - Combined greedy and gradient-based discrete optimization
  - Robust multi-prompt and multi-model attacks
baselines:
- PEZ
- GBDA
- AutoPrompt
reference_implementation:
- github.com/llm-attacks/llm-attacks
datasets:
- name: Vicuna-7B
  source: external
  description: A language model used to train adversarial attack suffixes.
  url: https://github.com/lm-sys/FastChat
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/lm-sys/FastChat.git

    '
- name: Vicuna-13B
  source: external
  description: A larger variant of the Vicuna language model used for training adversarial
    attack suffixes.
  url: https://github.com/lm-sys/FastChat
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/lm-sys/FastChat.git

    '
compute_hint: single GPU, <24h
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
- Implement the proposed method yourself -- do not import it from a library that bundles
  the paper's exact code.
