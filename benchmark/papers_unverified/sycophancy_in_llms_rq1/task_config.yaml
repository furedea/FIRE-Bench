task_id: sycophancy_in_llms_rq1
paper_type: llm_evaluation
research_question: 'RQ2: Does human preference data incentivize sycophantic behavior
  in AI models?'
models:
  api:
  - gpt-4
  huggingface:
  - meta-llama/Llama-2-70b-chat
api_key_var: OPENAI_API_KEY
