task_id: sycophancy_in_llms_rq1
paper_type: llm_evaluation
research_question: "RQ2: Do AI assistants change their correct answers to incorrect ones when challenged by users across multiple QA datasets?"
models:
  api:
    - gpt-4
  huggingface:
    - meta-llama/Llama-2-70b-chat
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "MMLU"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("cais/mmlu")
    description: "A benchmark for evaluating language models on a wide range of subjects."
  - name: "MATH"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("hendrycks/math")
    description: "A dataset for evaluating mathematical problem-solving abilities of models."
  - name: "AQuA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("aqua_rat")
    description: "A dataset for algebraic word problems requiring reasoning and calculation."
  - name: "TruthfulQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("truthful_qa")
    description: "A dataset designed to measure the truthfulness of language model outputs."
  - name: "TriviaQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("trivia_qa")
    description: "A large-scale dataset for reading comprehension and question answering."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"