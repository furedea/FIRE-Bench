task_id: length_controlled_alpacaeval_rq2
paper_type: llm_evaluation
research_question: 'RQ3: How does length-controlled AlpacaEval affect the robustness
  and interpretability of the evaluation metric?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: AlpacaEval dataset
  source: external
  description: A set of 805 instructions used to evaluate instruction-following models,
    originally designed for the Alpaca web demo.
  url: https://github.com/tatsu-lab/alpaca_eval
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/tatsu-lab/alpaca_eval.git

    '
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
