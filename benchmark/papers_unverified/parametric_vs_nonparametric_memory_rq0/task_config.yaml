task_id: parametric_vs_nonparametric_memory_rq0
paper_type: llm_evaluation
research_question: 'RQ1: How much factual knowledge is memorized by LMs and what factors
  affect the memorization?'
models:
  api:
  - gpt-4o
  huggingface:
  - EleutherAI/gpt-neo-2.7B
  - facebook/opt-13b
  - openai/gpt-3
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: POPQA
  source: synthetic
  description: A dataset with 14k questions about long-tail entities, created by sampling
    knowledge triples from Wikidata and converting them into natural language questions.
- name: EntityQuestions
  source: unknown
  description: An open-domain QA dataset with a long-tail distribution.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
