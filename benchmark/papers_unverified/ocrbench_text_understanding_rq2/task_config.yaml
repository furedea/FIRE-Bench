task_id: ocrbench_text_understanding_rq2
paper_type: llm_evaluation
research_question: "RQ3: How effective are Large Multimodal Models in Document-Oriented Visual Question Answering (VQA) tasks using datasets such as DocVQA, InfographicVQA, and ChartQA?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "DocVQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("docvqa")
    description: "A large-scale dataset with document images and questions for Document-Oriented VQA."
  - name: "InfographicVQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("infographicvqa")
    description: "A dataset consisting of infographics with questions for visual question answering."
  - name: "ChartQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("chartqa")
    description: "A dataset with charts and questions requiring visual and logical reasoning for VQA."
references: []
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"