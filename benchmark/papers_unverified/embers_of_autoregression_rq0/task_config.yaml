task_id: embers_of_autoregression_rq0
paper_type: empirical_study
research_question: "RQ1: How does the frequency of tasks in training data affect the performance of large language models (GPT-3.5 and GPT-4) on tasks like shift ciphers, Pig Latin, acronyms, linear functions, and sorting?"
study_type: dataset audit
data_sources:
  - name: "C4 corpus"
    source: huggingface
    loader: |
      from datasets import load_dataset
      c4 = load_dataset("allenai/c4", split='train')
    description: "A large-scale dataset of web-crawled text used to analyze the frequency of shift ciphers and sorting tasks."
  - name: "Pile dataset"
    source: huggingface
    loader: |
      from datasets import load_dataset
      pile = load_dataset("EleutherAI/pile", split='train')
    description: "A diverse dataset of text used to analyze the frequency of Pig Latin variants."
analytical_tools:
  - "GPT-2 for probability estimation"
  - "Logistic regression for statistical analysis"
references: []
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"