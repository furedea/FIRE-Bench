task_id: lets_verify_step_by_step_rq2
paper_type: llm_evaluation
research_question: "RQ3: Can a large reward model approximate human supervision effectively for training smaller reward models in mathematical reasoning tasks?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "MATH"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("hendrycks/math")
    description: "A dataset measuring mathematical problem-solving abilities."
  - name: "PRM800K"
    source: synthetic
    description: "A dataset of 800,000 step-level human feedback labels used to train reward models."
  - name: "MathMix"
    source: synthetic
    description: "A large-scale dataset of high-quality math-relevant tokens used for pretraining."
references: []
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"