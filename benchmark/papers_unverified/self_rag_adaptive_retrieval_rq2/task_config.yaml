task_id: self_rag_adaptive_retrieval_rq2
paper_type: novel_architecture
research_question: 'RQ3: How does SELF-RAG enable customizable inference-time behavior?'
proposed_method:
  name: SELF-RAG
  summary: SELF-RAG is a framework that enhances the quality and factuality of large
    language models (LLMs) through retrieval and self-reflection. It trains an arbitrary
    LLM to adaptively retrieve passages on-demand and generate and reflect on retrieved
    passages and its own generations using special tokens called reflection tokens.
    These tokens make the LLM controllable during inference, allowing it to tailor
    its behavior to diverse task requirements.
  key_components:
  - Adaptive retrieval mechanism using reflection tokens
  - Critique tokens for self-evaluation of generation quality
  - Customizable inference-time behavior through reflection tokens
baselines:
- ChatGPT
- Llama2-chat
- Alpaca
reference_implementation: []
datasets:
- name: ASQA
  source: unknown
  description: A long-form QA task dataset used to evaluate correctness, fluency,
    and citation precision and recall.
compute_hint: single GPU, <24h
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
- Implement the proposed method yourself -- do not import it from a library that bundles
  the paper's exact code.
