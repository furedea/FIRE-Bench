task_id: mmbench_comprehensive_rq0
paper_type: llm_evaluation
research_question: 'RQ1: How does MMBench improve upon existing benchmarks in evaluating
  VLMs?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: MMBench
  source: synthetic
  description: A systematically designed objective benchmark for evaluating the multi-modal
    capabilities of vision-language models, featuring over 3000 multiple-choice questions
    across 20 ability dimensions.
- name: VQAv2
  source: huggingface
  loader: 'from datasets import load_dataset

    dataset = load_dataset("visual_genome", "vqav2")

    '
  description: A dataset for visual question answering, providing question-answer
    pairs related to images.
- name: COCO Caption
  source: external
  description: A dataset containing images with human-generated captions, used for
    image captioning tasks.
  url: https://github.com/cocodataset/cocoapi
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/cocodataset/cocoapi.git

    '
- name: OwlEval
  source: unknown
  description: A subjective benchmark incorporating human judgment for evaluating
    vision-language models.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
