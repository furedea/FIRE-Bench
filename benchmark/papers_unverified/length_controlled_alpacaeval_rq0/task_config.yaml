task_id: length_controlled_alpacaeval_rq0
paper_type: llm_evaluation
research_question: 'RQ1: How can regression analysis be used to control for length
  bias in AlpacaEval?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: AlpacaEval
  source: external
  description: A benchmark for instruction-tuned LLMs using a fixed set of 805 instructions
    to evaluate model responses.
  url: https://github.com/tatsu-lab/alpaca_eval
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/tatsu-lab/alpaca_eval.git

    '
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
