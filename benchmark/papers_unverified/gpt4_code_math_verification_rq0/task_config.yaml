task_id: gpt4_code_math_verification_rq0
paper_type: novel_architecture
research_question: "RQ1: How does the frequency of code usage affect the mathematical problem-solving capabilities of GPT-4 Code Interpreter on the MATH dataset?"
proposed_method:
  name: "Explicit Code-Based Self-Verification (CSV)"
  summary: "The paper introduces a novel prompting method called explicit code-based self-verification (CSV) to enhance the mathematical reasoning capabilities of the GPT-4 Code Interpreter. This method encourages the model to use code to self-verify its answers, allowing it to automatically amend its solutions when verification fails. The approach leverages the model's ability to generate and execute code, evaluate outputs, and rectify solutions, thereby improving accuracy in solving mathematical problems."
  key_components:
    - "Explicit code-based self-verification prompting technique"
    - "Integration of code generation and execution for self-verification"
    - "Weighted majority voting strategy based on verification states"
baselines:
  - "GPT-4"
  - "GPT-3.5"
  - "Chain-of-Thought (CoT)"
  - "Program-Aided Language model (PAL)"
reference_implementation: []
datasets:
  - name: "MATH"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("hendrycks/math")
    description: "A challenging dataset of mathematical word problems designed to test the problem-solving abilities of models."
compute_hint: "single GPU, <24h"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"
  - "Implement the proposed method yourself -- do not import it from a library that bundles the paper's exact code."