task_id: gpt4_code_math_verification_rq0
paper_type: novel_architecture
research_question: 'RQ1: How does code generation and execution impact GPT-4 Code
  Interpreter''s performance in solving math problems?'
proposed_method:
  name: Explicit Code-Based Self-Verification (CSV)
  summary: The paper introduces a novel prompting method called explicit code-based
    self-verification (CSV) to enhance the mathematical reasoning capabilities of
    the GPT-4 Code Interpreter. This method encourages the model to use code to self-verify
    its answers, automatically amending its solution when verification fails, thereby
    improving accuracy in solving math problems.
  key_components:
  - Zero-shot prompt for code-based self-verification
  - Integration of code generation and execution for solution verification
  - Weighted majority voting based on verification states
baselines:
- GPT-4
- GPT-3.5
- PAL (Program-Aided Language model)
reference_implementation: []
datasets:
- name: MATH
  source: external
  description: A dataset designed to measure mathematical problem-solving abilities,
    containing challenging math word problems.
  url: https://github.com/hendrycks/math
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/hendrycks/math.git

    '
- name: GSM8K
  source: huggingface
  loader: 'from datasets import load_dataset

    dataset = load_dataset("gsm8k")

    '
  description: A dataset of grade school math problems used to evaluate arithmetic
    and reasoning capabilities.
- name: MMLU-Math
  source: huggingface
  description: A subset of the MMLU benchmark focusing on mathematical problem-solving
    tasks.
  loader: 'from datasets import load_dataset

    ds = load_dataset(''cais/mmlu'')

    '
compute_hint: single GPU, <24h
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
- Implement the proposed method yourself -- do not import it from a library that bundles
  the paper's exact code.
