task_id: toolformer_self_taught_tools_rq1
paper_type: novel_architecture
research_question: "RQ2: Does the self-supervised learning of tool use affect the core language modeling abilities of the language model?"
proposed_method:
  name: "Toolformer"
  summary: "Toolformer is a language model architecture that autonomously learns to use external tools via APIs in a self-supervised manner. It decides which APIs to call, when to call them, what arguments to pass, and how to incorporate the results into future token predictions. This approach allows the model to enhance its performance on tasks like arithmetic and factual lookup without sacrificing its core language modeling abilities."
  key_components:
    - "API call decision-making mechanism"
    - "Self-supervised learning framework for tool use"
    - "Integration with external tools like calculators, Q&A systems, and search engines"
baselines:
  - "GPT-J"
  - "GPT-3"
  - "OPT"
reference_implementation: []
datasets:
  - name: "WikiText"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("wikitext", "wikitext-103-v1")
    description: "A dataset consisting of Wikipedia articles used for language modeling tasks."
  - name: "CCNet"
    source: unknown
    loader: 
    description: "A large-scale dataset extracted from web crawl data, used for language modeling."
