task_id: toolformer_self_taught_tools_rq1
paper_type: novel_architecture
research_question: 'RQ2: Does the use of external tools improve the zero-shot performance
  of language models on various downstream tasks?'
proposed_method:
  name: Toolformer
  summary: Toolformer is a language model architecture that autonomously learns to
    use external tools via simple APIs to enhance its performance on various tasks.
    It is trained to decide which APIs to call, when to call them, what arguments
    to pass, and how to incorporate the results into future token prediction. This
    is achieved in a self-supervised manner, requiring only a few demonstrations for
    each API. Toolformer integrates tools such as a calculator, a Q&A system, a search
    engine, a translation system, and a calendar, significantly improving zero-shot
    performance across various tasks without sacrificing core language modeling abilities.
  key_components:
  - API call decision-making mechanism
  - Self-supervised learning for tool use
  - Integration of multiple external tools (calculator, Q&A system, search engine,
    translation system, calendar)
baselines:
- GPT-J
- GPT-3
- OPT (66B)
reference_implementation: []
datasets:
