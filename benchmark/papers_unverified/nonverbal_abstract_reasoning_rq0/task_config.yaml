task_id: nonverbal_abstract_reasoning_rq0
paper_type: llm_evaluation
research_question: "RQ1: Do multi-modal large language models (MLLMs, which process and integrate information from multiple modalities such as text and images) demonstrate faithful nonverbal abstract reasoning abilities using Raven’s Progressive Matrices (RPM, a set of visual puzzles designed to assess abstract reasoning) benchmarks, specifically on the IQ50, RAVEN-S, and CCSE datasets in zero-shot and few-shot settings?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "IQ50"
    source: synthetic
    description: "A nonverbal reasoning benchmark containing 50 visual puzzles crawled from the internet, augmented with textual description and hint annotations."
  - name: "RAVEN-S"
    source: synthetic
    description: "A visual reasoning dataset containing 3,500 synthetic samples in seven categories, each with a 3x3 matrix of images and eight options."
  - name: "CCSE"
    source: synthetic
    description: "A dataset of 175 visual abstractions and reasoning problems from the China Civil Service Examination, each containing a matrix or sequence of images with four options."
references: []
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"