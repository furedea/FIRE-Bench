task_id: react_reasoning_acting_rq0
paper_type: novel_architecture
research_question: "RQ1: How does integrating reasoning and acting within a single framework perform on knowledge-intensive reasoning tasks, specifically multi-hop question answering using the HotpotQA dataset and fact verification using the FEVER dataset, evaluated through metrics like Exact Match and Accuracy?"
proposed_method:
  name: "ReAct"
  summary: "ReAct is a novel approach that integrates reasoning and acting within large language models to enhance their performance on diverse tasks. It prompts models to generate both reasoning traces and task-specific actions in an interleaved manner, allowing for dynamic reasoning and interaction with external environments. This synergy helps in inducing, tracking, and updating action plans, as well as handling exceptions and gathering additional information from external sources."
  key_components:
    - "Interleaved generation of reasoning traces and task-specific actions"
    - "Interaction with external environments like Wikipedia for information retrieval"
    - "Use of large language models like PaLM-540B for few-shot prompting"
baselines:
  - "Chain-of-Thought (CoT)"
  - "Act-only"
  - "CoT-SC (Self-Consistency)"
reference_implementation:
  - "https://react-lm.github.io/"
datasets:
  - name: "HotpotQA"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("hotpot_qa", "fullwiki")
    description: "A multi-hop question answering benchmark that requires reasoning over two or more Wikipedia passages."
  - name: "FEVER"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("fever")
    description: "A fact verification benchmark where each claim is annotated as SUPPORTS, REFUTES, or NOT ENOUGH INFO based on Wikipedia passages."
compute_hint: "single GPU, <24h"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"
  - "Implement the proposed method yourself -- do not import it from a library that bundles the paper's exact code."