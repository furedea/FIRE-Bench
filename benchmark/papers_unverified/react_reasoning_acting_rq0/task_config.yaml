task_id: react_reasoning_acting_rq0
paper_type: novel_architecture
research_question: 'RQ1: How does the ReAct approach perform on knowledge-intensive
  reasoning tasks compared to existing methods?'
proposed_method:
  name: ReAct
  summary: ReAct is a novel approach that integrates reasoning and acting capabilities
    in large language models (LLMs) to improve performance on language understanding
    and decision-making tasks. It prompts LLMs to generate both reasoning traces and
    task-specific actions in an interleaved manner, allowing for greater synergy between
    reasoning and acting. This approach helps the model induce, track, and update
    action plans, handle exceptions, and gather additional information from external
    sources like knowledge bases.
  key_components:
  - Interleaved generation of reasoning traces and task-specific actions
  - Interaction with external environments (e.g., Wikipedia API) for information retrieval
  - Use of large language models like PaLM-540B for few-shot in-context learning
baselines:
- Chain-of-Thought (CoT)
- Act-only
reference_implementation:
- https://react-lm.github.io/
datasets:
- name: HotpotQA
  source: huggingface
  description: A multi-hop question answering benchmark that requires reasoning over
    two or more Wikipedia passages.
  loader: 'from datasets import load_dataset

    ds = load_dataset(''hotpot_qa'')

    '
- name: Fever
  source: huggingface
  description: A fact verification benchmark where each claim is annotated as SUPPORTS,
    REFUTES, or NOT ENOUGH INFO based on Wikipedia passages.
  loader: 'from datasets import load_dataset

    ds = load_dataset(''fever'')

    '
- name: ALFWorld
  source: external
  description: A synthetic text-based game designed to align with the embodied ALFRED
    benchmark, requiring navigation and interaction in a simulated household.
  url: https://github.com/alfworld/alfworld
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/alfworld/alfworld.git

    '
- name: WebShop
  source: external
  description: An online shopping website environment with real-world products and
    human instructions, requiring agents to purchase products based on user instructions.
  url: https://github.com/princeton-nlp/WebShop
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/princeton-nlp/WebShop.git

    '
compute_hint: single GPU, <24h
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
- Implement the proposed method yourself -- do not import it from a library that bundles
  the paper's exact code.
