task_id: geval_llm_evaluator_rq0
paper_type: llm_evaluation
research_question: "RQ1: How does an AI-based evaluation system perform in assessing text summarization quality compared to existing metrics, using correlation measures such as Spearman and Kendall-Tau on a standard benchmark?"
models:
  api:
    - gpt-4
  huggingface: []
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "SummEval"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("cais/summeval")
    description: "A benchmark that compares different evaluation methods for summarization, providing human ratings for fluency, coherence, consistency, and relevance."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"