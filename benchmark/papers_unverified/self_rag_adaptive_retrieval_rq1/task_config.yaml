task_id: self_rag_adaptive_retrieval_rq1
paper_type: novel_architecture
research_question: 'RQ2: What is the impact of reflection tokens on the performance
  of SELF-RAG?'
proposed_method:
  name: SELF-RAG
  summary: SELF-RAG is a framework that enhances the quality and factuality of large
    language models (LLMs) through retrieval and self-reflection. It trains an arbitrary
    LM to adaptively retrieve passages on-demand and generate and reflect on retrieved
    passages and its own generations using special tokens called reflection tokens.
    These tokens make the LM controllable during inference, allowing it to tailor
    its behavior to diverse task requirements.
  key_components:
  - 'Reflection tokens: Special tokens that enable the model to decide when to retrieve
    information and to critique its own output for factuality and quality.'
baselines:
- ChatGPT
- Llama2-chat
- Alpaca
reference_implementation:
- https://selfrag.github.io/
datasets:
- name: PopQA
  source: unknown
  description: A dataset consisting of open-domain questions about factual knowledge.
- name: PubHealth
  source: unknown
  description: A fact verification dataset about public health.
- name: ASQA
  source: unknown
  description: A long-form QA task dataset.
compute_hint: single GPU, <24h
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
- Implement the proposed method yourself -- do not import it from a library that bundles
  the paper's exact code.
