task_id: v_star_visual_search_rq1
paper_type: novel_architecture
research_question: "RQ2: What is the effectiveness of a visual search algorithm in reducing search length and improving search efficiency when locating target objects within high-resolution images, compared to random and sequential search strategies?"
proposed_method:
  name: "V∗ Visual Search Algorithm"
  summary: "V∗ is an LLM-guided visual search mechanism designed to enhance multimodal large language models (MLLMs) by efficiently locating target objects within high-resolution images. It leverages the world knowledge of LLMs to perform informed searches, building a visual working memory (VWM) that aids in precise visual grounding and reasoning."
  key_components:
    - "LLM-guided visual search process using contextual cues and common sense knowledge"
    - "Visual Working Memory (VWM) to store and process visual information"
    - "Integration with MLLMs to improve visual grounding and reasoning"
baselines:
  - "Random Search Strategy"
  - "Sequential Search Strategy"
reference_implementation: []
datasets:
  - name: "V∗Bench"
    source: synthetic
    loader: |
      import numpy as np

      def generate_v_star_bench():
          # Synthetic generation of high-resolution images with target objects
          images = np.random.rand(191, 2246, 1582, 3)  # Example shape
          return images
    description: "A benchmark designed to evaluate MLLMs' ability to process high-resolution images and focus on visual details, specifically for visual grounding tasks."
compute_hint: "single GPU, <24h"
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"
  - "Implement the proposed method yourself -- do not import it from a library that bundles the paper's exact code."