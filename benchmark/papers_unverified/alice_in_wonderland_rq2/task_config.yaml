task_id: alice_in_wonderland_rq2
paper_type: llm_evaluation
research_question: "RQ3: Do standardized benchmarks like MMLU, GSM8k, and ARC-c accurately reflect the generalization and reasoning capabilities of state-of-the-art large language models, as assessed by their performance on simple Artificial Intelligence Workbench (AIW, a set of basic AI problems) tasks?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "MMLU"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("cais/mmlu")
    description: "A benchmark for measuring massive multitask language understanding."
  - name: "GSM8k"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("openai/gsm8k")
    description: "A dataset for evaluating mathematical problem-solving abilities of language models."
  - name: "ARC-c"
    source: huggingface
    loader: |
      from datasets import load_dataset
      dataset = load_dataset("ai2_arc/ARC-c")
    description: "A dataset for evaluating reasoning capabilities in science questions."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"