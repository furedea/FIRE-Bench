task_id: alice_in_wonderland_rq1
paper_type: llm_evaluation
research_question: 'RQ2: Are the observed reasoning breakdowns in LLMs due to low-level
  issues or generic deficits in generalization?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: AIW Light Arithmetic Siblings
  source: synthetic
  description: A control problem designed to test models' ability to handle arithmetic
    operations in the context of family relations.
- name: AIW Light Family
  source: synthetic
  description: A control problem designed to test models' understanding of basic family
    structure and relations.
- name: AIW Light Arithmetic Total Girls
  source: synthetic
  description: A control problem designed to test models' ability to bind attributes
    and execute arithmetic operations to count total females.
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
