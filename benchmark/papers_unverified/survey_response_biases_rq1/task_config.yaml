task_id: survey_response_biases_rq1
paper_type: llm_evaluation
research_question: 'RQ2: How do RLHF-ed models differ from vanilla LLMs in terms of
  response biases?'
models:
  api:
  - gpt-4o
  huggingface:
  - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
- name: American Trends Panel (ATP)
  source: external
  description: A set of survey questions curated by Pew Research, used to study response
    biases in LLMs.
  url: https://www.pewresearch.org/american-trends-panel/
  url_kind: website
  loader: '# Download instructions and data are at:

    # https://www.pewresearch.org/american-trends-panel/

    '
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
