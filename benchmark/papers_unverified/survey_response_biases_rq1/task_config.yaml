task_id: survey_response_biases_rq1
paper_type: llm_evaluation
research_question: "RQ2: How do large language models (LLMs) respond to non-bias perturbations, such as typos, letter swaps, and middle randomization, in survey questions derived from Pew Research's American Trends Panel?"
models:
  api:
    - gpt-4o
  huggingface:
    - meta-llama/Llama-3.1-8B-Instruct
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "American Trends Panel"
    source: unknown
    description: "Survey questions derived from Pew Research's American Trends Panel, used to evaluate LLMs' sensitivity to non-bias perturbations."
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"