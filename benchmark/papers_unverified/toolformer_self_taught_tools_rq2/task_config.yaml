task_id: toolformer_self_taught_tools_rq2
paper_type: novel_architecture
research_question: 'RQ3: Does the ability to use tools affect the language modeling
  capabilities of the model?'
proposed_method:
  name: Toolformer
  summary: Toolformer is a language model architecture that autonomously learns to
    use external tools via APIs to enhance its performance on various tasks. It decides
    which APIs to call, when to call them, what arguments to pass, and how to incorporate
    the results into future token predictions. This is achieved through a self-supervised
    learning approach, requiring only a few demonstrations for each API.
  key_components:
  - API call decision-making mechanism
  - Self-supervised learning for tool use
  - Integration with external tools like calculators, Q&A systems, and search engines
baselines:
- GPT-J
- GPT-3
- OPT
reference_implementation: []
datasets:
- name: WikiText
  source: huggingface
  loader: 'from datasets import load_dataset

    dataset = load_dataset("wikitext", "wikitext-103-v1")

    '
  description: A dataset consisting of a collection of Wikipedia articles used for
    language modeling tasks.
- name: CCNet
  source: external
  description: A large-scale dataset extracted from web crawl data, used for language
    modeling and pretraining.
  url: https://github.com/facebookresearch/cc_net
  url_kind: github
  loader: '# Clone the repo and follow its README to load the data:

    # git clone https://github.com/facebookresearch/cc_net.git

    '
compute_hint: single GPU, <24h
constraints:
- Do NOT use web search
- Run FULL end-to-end experiments
- Implement the proposed method yourself -- do not import it from a library that bundles
  the paper's exact code.
