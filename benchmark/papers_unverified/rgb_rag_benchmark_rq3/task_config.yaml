task_id: rgb_rag_benchmark_rq3
paper_type: llm_evaluation
research_question: "RQ4: Can large language models (ChatGPT, Qwen-7B-Chat) identify and correct factual errors in retrieved documents when given warnings, evaluated in English and Chinese?"
models:
  api:
    - gpt-4o
  huggingface:
    - QwenLM/Qwen-7B-Chat
api_key_var: OPENAI_API_KEY
budget_per_model: 1000
datasets:
  - name: "Retrieval-Augmented Generation Benchmark (RGB)"
    source: synthetic
    description: "A benchmark designed to evaluate the retrieval-augmented generation capabilities of LLMs in English and Chinese, focusing on noise robustness, negative rejection, information integration, and counterfactual robustness."
references: []
constraints:
  - "Do NOT use web search"
  - "Run FULL end-to-end experiments"